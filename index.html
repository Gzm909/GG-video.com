<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GDX - 下一代视频娱乐平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/dplayer@1.27.1/dist/DPlayer.min.css">
    <script src="https://unpkg.com/hls.js@1.4.12/dist/hls.min.js"></script>
    <script src="https://unpkg.com/dplayer@1.27.1/dist/DPlayer.min.js"></script>
    <style>
        * { 
            font-family: 'Inter', 'Noto Sans SC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ==================== 主题变量 ==================== */
        :root {
            --primary: #00be06;
            --secondary: #7b2cbf;
            --accent: #ff006e;
            --dark: #0a0a0f;
            --surface: #12121a;
            --elevated: #1a1a25;
            --border: rgba(255,255,255,0.08);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --indicator-active: #00be06;
            --indicator-inactive: #6b7280;
        }
        
        [data-theme="light"] {
            --primary: #00be06;
            --secondary: #00a806;
            --accent: #FFD700;
            --dark: #f3f4f6;
            --surface: #ffffff;
            --elevated: #f9fafb;
            --border: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
        }
        
        [data-theme="pink"] {
            --primary: #ec4899;
            --secondary: #db2777;
            --accent: #f472b6;
            --dark: #fdf2f8;
            --surface: #ffffff;
            --elevated: #fce7f3;
            --border: #fbcfe8;
            --text-primary: #831843;
            --text-secondary: #be185d;
        }
        
        body {
            background: var(--dark);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }
        
        /* ==================== 左侧 Dock 栏（120px） ==================== */
        .side-dock {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 120px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }
        
        /* 顶部 Logo */
        .dock-logo-container {
            height: 56px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .dock-logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
        }
        
        /* 中部垂直导航 - 首页/发现/会员/我的 - 垂直居中 */
        .dock-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: stretch;
            padding: 0 12px;
            gap: 20px;
        }
        
        .dock-nav-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            padding: 12px 16px;
            border-radius: 12px;
        }
        
        .dock-nav-item:hover, .dock-nav-item.active {
            color: var(--primary);
            background: rgba(0,190,6,0.1);
        }
        
        .dock-nav-item i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }
        
        /* 底部留白 */
        .dock-bottom {
            height: 56px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        
        /* ==================== 主内容区 ==================== */
        .main-content {
            margin-left: 120px;
            min-height: 100vh;
        }
        
        /* 顶部固定栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 120px;
            right: 0;
            height: 56px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            transition: background-color 0.3s, border-color 0.3s;
        }
        
        /* 顶部左侧 - 分类标签 */
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }
        
        /* 分类标签 */
        .category-tabs {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            no-scrollbar;
        }
        
        .category-tab {
            padding: 8px 16px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
            white-space: nowrap;
        }
        
        .category-tab:hover, .category-tab.active {
            color: var(--primary);
            background: rgba(0,190,6,0.1);
        }
        
        /* 顶部右侧 - 搜索 + 头像 */
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        /* 搜索框 */
        .search-box {
            position: relative;
            width: 200px;
        }
        
        .search-box input {
            width: 100%;
            height: 36px;
            background: var(--elevated);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 0 36px 0 16px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            border-color: var(--primary);
            background: var(--surface);
        }
        
        .search-box input::placeholder {
            color: var(--text-secondary);
        }
        
        .search-box i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        /* 搜索结果下拉 */
        .search-results {
            position: absolute;
            top: 44px;
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        
        .search-results.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .search-result-item:hover {
            background: var(--elevated);
        }
        
        .search-result-item img {
            width: 60px;
            height: 34px;
            border-radius: 4px;
            object-fit: cover;
        }
        
        .search-result-item .info {
            flex: 1;
        }
        
        .search-result-item .title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .search-result-item .meta {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .search-result-item .rating {
            color: #FFD700;
            font-size: 12px;
            font-weight: 600;
        }
        
        .avatar-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #00a806);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
            transition: transform 0.2s;
            position: relative;
        }
        
        .avatar-btn:hover {
            transform: scale(1.05);
        }
        
        /* 头像下拉菜单 */
        .avatar-dropdown {
            position: absolute;
            top: 48px;
            right: 0;
            width: 200px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        
        .avatar-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .dropdown-item:hover {
            background: var(--elevated);
        }
        
        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 8px 0;
        }
        
        .dropdown-section-title {
            padding: 8px 16px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .theme-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .theme-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--border);
        }
        
        .theme-dot.dark { background: #0a0a0f; }
        .theme-dot.light { background: #f3f4f6; }
        .theme-dot.pink { background: #fce7f3; }
        
        .theme-option.active .theme-dot {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary);
        }
        
        /* ==================== 正在热播 - 横向大卡片轮播 ==================== */
        .hero-section {
            padding: 80px 24px 24px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title i {
            color: var(--primary);
        }
        
        .hot-scroll {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            padding-bottom: 20px;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        
        .hot-card {
            flex-shrink: 0;
            width: 640px;
            height: 360px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            scroll-snap-align: start;
        }
        
        .hot-card:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        .hot-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .hot-card .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px;
        }
        
        .hot-card .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0,190,6,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .hot-card:hover .play-btn {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .hot-card .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .hot-card .meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        /* 轮播指示器 */
        .carousel-indicators {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        
        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--indicator-inactive);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .carousel-dot.active {
            background: var(--indicator-active);
            width: 24px;
            border-radius: 4px;
        }
        
        /* ==================== 分类区块 - 4列小网格 ==================== */
        .category-section {
            padding: 24px;
            scroll-margin-top: 80px;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        
        .video-card {
            border-radius: 12px;
            overflow: hidden;
            background: var(--elevated);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
        }
        
        .video-card .thumb {
            aspect-ratio: 16/9;
            position: relative;
            overflow: hidden;
        }
        
        .video-card .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        
        .video-card:hover .thumb img {
            transform: scale(1.1);
        }
        
        .video-card .info {
            padding: 12px;
        }
        
        .video-card .title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .video-card .meta {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* 标签 */
        .badge-vip {
            position: absolute;
            top: 8px;
            left: 8px;
            padding: 4px 8px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            font-size: 10px;
            font-weight: 800;
            border-radius: 4px;
        }
        
        .badge-rating {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: #FFD700;
            font-size: 12px;
            font-weight: 700;
            border-radius: 4px;
        }
        
        /* ==================== 页面内容区域 ==================== */
        .page-content {
            display: none;
        }
        
        .page-content.active {
            display: block;
        }
        
        /* ==================== 播放器 ==================== */
        .player-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #000;
            display: none;
        }
        
        .player-modal.active {
            display: flex;
            flex-direction: column;
        }
        
        #dplayer {
            flex: 1;
        }
        
        /* ==================== Toast ==================== */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--surface);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid var(--border);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1001;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <!-- 配置 -->
    <script>
        const API_BASE = 'http://47.98.254.208:3000';
        let currentTheme = 'dark';
        let currentCategory = 'all';
        let currentPage = 'home';
        let carouselInterval = null;
        let currentCarouselIndex = 0;
        let isCarouselRunning = false; // 新增：严格标记轮播运行状态
    </script>

    <!-- ==================== 左侧 Dock 栏（120px） ==================== -->
    <nav class="side-dock">
        <!-- 顶部 Logo -->
        <div class="dock-logo-container">
            <span class="dock-logo">GDX</span>
        </div>
        
        <!-- 中部垂直导航 - 首页/发现/会员/我的 - 垂直居中 -->
        <div class="dock-nav">
            <div class="dock-nav-item active" onclick="switchTopNav('home', this)">
                <i class="fas fa-home"></i>
                <span>首页</span>
            </div>
            <div class="dock-nav-item" onclick="switchTopNav('discover', this)">
                <i class="fas fa-compass"></i>
                <span>发现</span>
            </div>
            <div class="dock-nav-item" onclick="switchTopNav('vip', this)">
                <i class="fas fa-crown"></i>
                <span>会员</span>
            </div>
            <div class="dock-nav-item" onclick="switchTopNav('profile', this)">
                <i class="fas fa-user"></i>
                <span>我的</span>
            </div>
        </div>
        
        <!-- 底部留白 -->
        <div class="dock-bottom"></div>
    </nav>

    <!-- ==================== 顶部栏 ==================== -->
    <header class="top-bar">
        <!-- 左侧：分类标签 -->
        <div class="top-bar-left">
            <div class="category-tabs no-scrollbar" id="categoryTabs">
                <div class="category-tab active" onclick="scrollToSection('hot', this)">正在热播</div>
                <div class="category-tab" onclick="scrollToSection('recommend', this)">推荐</div>
                <div class="category-tab" onclick="scrollToSection('movie', this)">电影</div>
                <div class="category-tab" onclick="scrollToSection('tv', this)">电视剧</div>
                <div class="category-tab" onclick="scrollToSection('variety', this)">综艺</div>
                <div class="category-tab" onclick="scrollToSection('anime', this)">动漫</div>
                <div class="category-tab" onclick="scrollToSection('documentary', this)">纪录片</div>
            </div>
        </div>
        
        <!-- 右侧：搜索 + 头像 -->
        <div class="top-bar-right">
            <!-- 搜索框 -->
            <div class="search-box" id="searchBox">
                <input type="text" placeholder="搜索视频、电影、电视剧..." id="searchInput">
                <i class="fas fa-search"></i>
                <!-- 搜索结果下拉 -->
                <div class="search-results" id="searchResults"></div>
            </div>
            
            <!-- 头像按钮 -->
            <button class="avatar-btn" onclick="toggleAvatarDropdown()">G</button>
            
            <!-- 头像下拉菜单 -->
            <div class="avatar-dropdown" id="avatarDropdown">
                <div class="dropdown-section-title">主题设置</div>
                <div class="dropdown-item theme-option active" onclick="setThemeFromDropdown('dark', this)">
                    <div class="theme-dot dark"></div>
                    <span>暗黑模式</span>
                </div>
                <div class="dropdown-item theme-option" onclick="setThemeFromDropdown('light', this)">
                    <div class="theme-dot light"></div>
                    <span>明亮模式</span>
                </div>
                <div class="dropdown-item theme-option" onclick="setThemeFromDropdown('pink', this)">
                    <div class="theme-dot pink"></div>
                    <span>粉色模式</span>
                </div>
                
                <div class="dropdown-divider"></div>
                
                <div class="dropdown-item" onclick="switchTopNav('profile', document.querySelector('.dock-nav-item[onclick*=profile]'))">
                    <i class="fas fa-user-circle"></i>
                    <span>个人中心</span>
                </div>
                <div class="dropdown-item">
                    <i class="fas fa-cog"></i>
                    <span>设置</span>
                </div>
                <div class="dropdown-item">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>退出登录</span>
                </div>
            </div>
        </div>
    </header>

    <!-- ==================== 主内容区 ==================== -->
    <main class="main-content">
        
        <!-- 首页页面 -->
        <div id="page-home" class="page-content active">
            <!-- 正在热播 -->
            <section id="section-hot" class="hero-section">
                <h2 class="section-title">
                    <i class="fas fa-fire"></i>
                    正在热播
                </h2>
                <div class="hot-scroll no-scrollbar" id="hotContainer">
                    <!-- 动态生成 -->
                </div>
                <!-- 轮播指示器 -->
                <div class="carousel-indicators" id="carouselIndicators"></div>
            </section>

            <!-- 推荐 -->
            <section id="section-recommend" class="category-section">
                <h2 class="section-title">
                    <i class="fas fa-thumbs-up"></i>
                    精选推荐
                </h2>
                <div class="video-grid" id="grid-recommend"></div>
            </section>

            <!-- 电影 -->
            <section id="section-movie" class="category-section">
                <h2 class="section-title">
                    <i class="fas fa-film"></i>
                    电影
                </h2>
                <div class="video-grid" id="grid-movie"></div>
            </section>

            <!-- 电视剧 -->
            <section id="section-tv" class="category-section">
                <h2 class="section-title">
                    <i class="fas fa-tv"></i>
                    电视剧
                </h2>
                <div class="video-grid" id="grid-tv"></div>
            </section>

            <!-- 综艺 -->
            <section id="section-variety" class="category-section">
                <h2 class="section-title">
                    <i class="fas fa-laugh-beam"></i>
                    综艺
                </h2>
                <div class="video-grid" id="grid-variety"></div>
            </section>

            <!-- 动漫 -->
            <section id="section-anime" class="category-section">
                <h2 class="section-title">
                    <i class="fas fa-dragon"></i>
                    动漫
                </h2>
                <div class="video-grid" id="grid-anime"></div>
            </section>

            <!-- 纪录片 -->
            <section id="section-documentary" class="category-section">
                <h2 class="section-title">
                    <i class="fas fa-globe"></i>
                    纪录片
                </h2>
                <div class="video-grid" id="grid-documentary"></div>
            </section>
        </div>

        <!-- 发现页面 -->
        <div id="page-discover" class="page-content">
            <div class="hero-section">
                <h2 class="section-title">
                    <i class="fas fa-compass"></i>
                    发现精彩
                </h2>
                <div class="video-grid" id="grid-discover"></div>
            </div>
        </div>

        <!-- 会员页面 -->
        <div id="page-vip" class="page-content">
            <div class="hero-section">
                <h2 class="section-title">
                    <i class="fas fa-crown text-yellow-500"></i>
                    VIP会员专区
                </h2>
                <div class="video-grid" id="grid-vip"></div>
            </div>
        </div>

        <!-- 我的页面 -->
        <div id="page-profile" class="page-content">
            <div class="hero-section">
                <h2 class="section-title">
                    <i class="fas fa-user"></i>
                    个人中心
                </h2>
                <div class="p-8 bg-[var(--elevated)] rounded-2xl max-w-2xl">
                    <div class="flex items-center gap-6 mb-8">
                        <div class="w-20 h-20 rounded-full bg-gradient-to-br from-green-400 to-green-600 flex items-center justify-center text-2xl font-bold">
                            G
                        </div>
                        <div>
                            <h3 class="text-2xl font-bold mb-2">用户昵称</h3>
                            <p class="text-[var(--text-secondary)]">VIP会员有效期至 2025-12-31</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="p-4 bg-[var(--surface)] rounded-xl text-center">
                            <div class="text-2xl font-bold text-[var(--primary)]">128</div>
                            <div class="text-sm text-[var(--text-secondary)]">观看历史</div>
                        </div>
                        <div class="p-4 bg-[var(--surface)] rounded-xl text-center">
                            <div class="text-2xl font-bold text-[var(--primary)]">36</div>
                            <div class="text-sm text-[var(--text-secondary)]">我的收藏</div>
                        </div>
                        <div class="p-4 bg-[var(--surface)] rounded-xl text-center">
                            <div class="text-2xl font-bold text-[var(--primary)]">12</div>
                            <div class="text-sm text-[var(--text-secondary)]">下载缓存</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- 播放器 -->
    <div class="player-modal" id="playerModal" onclick="if(event.target === this) closePlayer()">
        <div id="dplayer"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">操作成功</div>

    <!-- JavaScript -->
    <script>
        // 示例数据
        const sampleImages = [
            'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=800&h=450&fit=crop',
            'https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?w=800&h=450&fit=crop',
            'https://images.unsplash.com/photo-1518676590629-3dcbd9c5a5c9?w=800&h=450&fit=crop',
            'https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=400&h=225&fit=crop',
            'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400&h=225&fit=crop',
            'https://images.unsplash.com/photo-1516280440614-6697288d5d38?w=400&h=225&fit=crop'
        ];

        function generateVideos() {
            const categories = ['movie', 'tv', 'variety', 'anime', 'documentary'];
            const titles = {
                movie: ['星际穿越', '盗梦空间', '肖申克的救赎', '阿甘正传', '泰坦尼克号'],
                tv: ['狂飙', '三体', '隐秘的角落', '庆余年', '漫长的季节'],
                variety: ['乐队的夏天', '脱口秀大会', '奇葩说', '向往的生活', '奔跑吧'],
                anime: ['千与千寻', '你的名字', '鬼灭之刃', '进击的巨人', '间谍过家家'],
                documentary: ['地球脉动', '舌尖上的中国', '我在故宫修文物', '人间世', '航拍中国']
            };
            
            let videos = [];
            let id = 1;
            
            categories.forEach(cat => {
                titles[cat].forEach((title, idx) => {
                    videos.push({
                        id: id++,
                        title: title,
                        category: cat,
                        cover: sampleImages[idx % sampleImages.length],
                        rating: (8 + Math.random() * 2).toFixed(1),
                        isVip: Math.random() > 0.5,
                        views: Math.floor(Math.random() * 1000000)
                    });
                });
            });
            
            return videos;
        }

        const allVideos = generateVideos();
        let dp = null;
        let hotVideos = [];

        // 初始化
        function init() {
            // 读取保存的主题
            const savedTheme = localStorage.getItem('theme') || 'dark';
            setTheme(savedTheme);
            updateDropdownThemeUI(savedTheme);
            
            renderHotSection();
            renderCategorySections();
            renderDiscoverPage();
            renderVipPage();
            setupScrollSpy();
            setupSearch();
            
            // 点击外部关闭下拉菜单
            document.addEventListener('click', (e) => {
                const dropdown = document.getElementById('avatarDropdown');
                const searchResults = document.getElementById('searchResults');
                const avatarBtn = document.querySelector('.avatar-btn');
                const searchBox = document.getElementById('searchBox');
                
                if (!dropdown.contains(e.target) && !avatarBtn.contains(e.target)) {
                    dropdown.classList.remove('show');
                }
                if (!searchBox.contains(e.target)) {
                    searchResults.classList.remove('show');
                }
            });
        }

        // 设置搜索功能
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            
            searchInput.addEventListener('input', (e) => {
                const keyword = e.target.value.trim().toLowerCase();
                
                if (keyword === '') {
                    searchResults.classList.remove('show');
                    return;
                }
                
                // 搜索过滤
                const results = allVideos.filter(v => 
                    v.title.toLowerCase().includes(keyword)
                ).slice(0, 5);
                
                if (results.length === 0) {
                    searchResults.innerHTML = '<div class="search-result-item"><span style="color: var(--text-secondary)">未找到相关视频</span></div>';
                } else {
                    searchResults.innerHTML = results.map(v => `
                        <div class="search-result-item" onclick="playVideo(${v.id}); document.getElementById('searchResults').classList.remove('show');">
                            <img src="${v.cover}" alt="${v.title}">
                            <div class="info">
                                <div class="title">${v.title}</div>
                                <div class="meta">${getCategoryName(v.category)} · ${(v.views / 10000).toFixed(1)}万次播放</div>
                            </div>
                            <div class="rating"><i class="fas fa-star"></i> ${v.rating}</div>
                        </div>
                    `).join('');
                }
                
                searchResults.classList.add('show');
            });
            
            // 回车键搜索
            searchInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    const keyword = e.target.value.trim().toLowerCase();
                    if (keyword) {
                        showToast('搜索: ' + keyword);
                    }
                }
            });
        }

        function getCategoryName(cat) {
            const names = {
                'movie': '电影',
                'tv': '电视剧',
                'variety': '综艺',
                'anime': '动漫',
                'documentary': '纪录片'
            };
            return names[cat] || cat;
        }

        // 渲染正在热播（横向大卡片轮播）
        function renderHotSection() {
            hotVideos = allVideos.filter(v => v.isVip).slice(0, 5);
            const container = document.getElementById('hotContainer');
            const indicatorsContainer = document.getElementById('carouselIndicators');
            
            container.innerHTML = hotVideos.map((v, index) => `
                <div class="hot-card" data-index="${index}" onclick="playVideo(${v.id})">
                    <img src="${v.cover}" alt="${v.title}">
                    <div class="overlay">
                        <div class="play-btn">
                            <i class="fas fa-play text-2xl text-white ml-1"></i>
                        </div>
                        <div class="title">${v.title}</div>
                        <div class="meta">
                            <span class="text-amber-400"><i class="fas fa-star mr-1"></i>${v.rating}</span>
                            <span>${(v.views / 10000).toFixed(1)}万次播放</span>
                            <span class="px-2 py-1 bg-white/20 rounded text-xs">${v.isVip ? 'VIP' : '免费'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // 生成指示器
            indicatorsContainer.innerHTML = hotVideos.map((_, index) => `
                <div class="carousel-dot ${index === 0 ? 'active' : ''}" onclick="goToCarouselSlide(${index})"></div>
            `).join('');
            
            // 启动自动轮播 - 只在首页启动
            if (currentPage === 'home') {
                startCarousel();
            }
            
            // 监听滚动更新指示器
            container.addEventListener('scroll', updateCarouselIndicator);
        }

        // 启动自动轮播
        function startCarousel() {
            // 严格停止已有定时器
            stopCarousel();
            
            // 双重检查：只有首页才启动
            if (currentPage !== 'home') {
                console.log('不在首页，拒绝启动轮播');
                return;
            }
            
            isCarouselRunning = true;
            console.log('启动轮播');
            
            carouselInterval = setInterval(() => {
                // 严格检查：只有首页且标记为运行中才执行
                if (currentPage !== 'home' || !isCarouselRunning) {
                    console.log('轮播条件不满足，跳过执行');
                    return;
                }
                
                const container = document.getElementById('hotContainer');
                if (!container) {
                    console.log('容器不存在，停止轮播');
                    stopCarousel();
                    return;
                }
                
                const nextIndex = (currentCarouselIndex + 1) % hotVideos.length;
                console.log('轮播跳转到:', nextIndex);
                goToCarouselSlide(nextIndex);
            }, 5000);
        }

        // 停止轮播 - 严格清除
        function stopCarousel() {
            console.log('停止轮播');
            isCarouselRunning = false;
            if (carouselInterval) {
                clearInterval(carouselInterval);
                carouselInterval = null;
            }
        }

        // 跳转到指定轮播项
        function goToCarouselSlide(index) {
            // 严格检查：只有首页才执行
            if (currentPage !== 'home') {
                console.log('不在首页，拒绝滚动');
                return;
            }
            
            const container = document.getElementById('hotContainer');
            if (!container) {
                console.log('容器不存在');
                return;
            }
            
            const cards = container.querySelectorAll('.hot-card');
            if (!cards[index]) {
                console.log('卡片不存在');
                return;
            }
            
            console.log('执行滚动到:', index);
            
            // 使用更安全的滚动方式
            const card = cards[index];
            const scrollLeft = card.offsetLeft - container.offsetLeft;
            container.scrollTo({ left: scrollLeft, behavior: 'smooth' });
            
            currentCarouselIndex = index;
            updateCarouselIndicator();
        }

        // 更新轮播指示器
        function updateCarouselIndicator() {
            const dots = document.querySelectorAll('.carousel-dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentCarouselIndex);
            });
        }

        // 渲染各分类区块
        function renderCategorySections() {
            const categories = ['recommend', 'movie', 'tv', 'variety', 'anime', 'documentary'];
            
            categories.forEach(cat => {
                let videos;
                if (cat === 'recommend') {
                    videos = allVideos.sort(() => Math.random() - 0.5).slice(0, 8);
                } else {
                    videos = allVideos.filter(v => v.category === cat).slice(0, 8);
                }
                
                const container = document.getElementById('grid-' + cat);
                if (container) {
                    container.innerHTML = videos.map(v => `
                        <div class="video-card" onclick="playVideo(${v.id})">
                            <div class="thumb">
                                <img src="${v.cover}" alt="${v.title}">
                                ${v.isVip ? '<div class="badge-vip">VIP</div>' : ''}
                                <div class="badge-rating"><i class="fas fa-star mr-1"></i>${v.rating}</div>
                            </div>
                            <div class="info">
                                <div class="title">${v.title}</div>
                                <div class="meta">${(v.views / 10000).toFixed(1)}万次播放</div>
                            </div>
                        </div>
                    `).join('');
                }
            });
        }

        // 渲染发现页面
        function renderDiscoverPage() {
            const container = document.getElementById('grid-discover');
            if (container) {
                const videos = allVideos.sort(() => Math.random() - 0.5).slice(0, 12);
                container.innerHTML = videos.map(v => `
                    <div class="video-card" onclick="playVideo(${v.id})">
                        <div class="thumb">
                            <img src="${v.cover}" alt="${v.title}">
                            ${v.isVip ? '<div class="badge-vip">VIP</div>' : ''}
                            <div class="badge-rating"><i class="fas fa-star mr-1"></i>${v.rating}</div>
                        </div>
                        <div class="info">
                            <div class="title">${v.title}</div>
                            <div class="meta">${(v.views / 10000).toFixed(1)}万次播放</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // 渲染VIP页面
        function renderVipPage() {
            const container = document.getElementById('grid-vip');
            if (container) {
                const videos = allVideos.filter(v => v.isVip).slice(0, 12);
                container.innerHTML = videos.map(v => `
                    <div class="video-card" onclick="playVideo(${v.id})">
                        <div class="thumb">
                            <img src="${v.cover}" alt="${v.title}">
                            <div class="badge-vip">VIP</div>
                            <div class="badge-rating"><i class="fas fa-star mr-1"></i>${v.rating}</div>
                        </div>
                        <div class="info">
                            <div class="title">${v.title}</div>
                            <div class="meta">${(v.views / 10000).toFixed(1)}万次播放</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // 滚动到指定区块
        function scrollToSection(sectionId, element) {
            // 只在首页时启用滚动
            if (currentPage !== 'home') {
                switchTopNav('home', document.querySelector('.dock-nav-item[onclick*="home"]'));
            }
            
            // 更新顶部标签状态
            document.querySelectorAll('.category-tab').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');
            
            const target = document.getElementById('section-' + sectionId);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 滚动监听（自动高亮顶部标签）
        function setupScrollSpy() {
            const sections = ['hot', 'recommend', 'movie', 'tv', 'variety', 'anime', 'documentary'];
            const tabs = document.querySelectorAll('.category-tab');
            
            window.addEventListener('scroll', () => {
                if (currentPage !== 'home') return;
                
                const scrollPos = window.scrollY + 100;
                
                sections.forEach((section, index) => {
                    const element = document.getElementById('section-' + section);
                    if (element) {
                        const offsetTop = element.offsetTop;
                        const offsetBottom = offsetTop + element.offsetHeight;
                        
                        if (scrollPos >= offsetTop && scrollPos < offsetBottom) {
                            tabs.forEach(el => el.classList.remove('active'));
                            tabs[index].classList.add('active');
                        }
                    }
                });
            });
        }

        // 顶部导航切换
        function switchTopNav(nav, element) {
            console.log('切换页面到:', nav);
            
            document.querySelectorAll('.dock-nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            // 严格停止轮播
            stopCarousel();
            
            currentPage = nav;
            
            // 隐藏所有页面
            document.querySelectorAll('.page-content').forEach(page => {
                page.classList.remove('active');
            });
            
            // 显示目标页面
            const targetPage = document.getElementById('page-' + nav);
            if (targetPage) {
                targetPage.classList.add('active');
            }
            
            // 控制顶部分类标签和搜索显示/隐藏
            const categoryTabs = document.getElementById('categoryTabs');
            const searchBox = document.getElementById('searchBox');
            if (categoryTabs) {
                categoryTabs.style.display = nav === 'home' ? 'flex' : 'none';
            }
            if (searchBox) {
                searchBox.style.display = nav === 'home' ? 'block' : 'none';
            }
            
            // 轮播控制：只有首页才启动
            if (nav === 'home') {
                console.log('回到首页，准备启动轮播');
                // 延迟启动，确保页面渲染完成
                setTimeout(() => {
                    if (currentPage === 'home') {
                        startCarousel();
                    }
                }, 100);
            }
            
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            showToast('切换到: ' + getNavName(nav));
            
            // 关闭下拉菜单
            document.getElementById('avatarDropdown').classList.remove('show');
        }

        function getNavName(nav) {
            const names = {
                'home': '首页',
                'discover': '发现',
                'vip': '会员',
                'profile': '我的'
            };
            return names[nav] || nav;
        }

        // 切换头像下拉菜单
        function toggleAvatarDropdown() {
            const dropdown = document.getElementById('avatarDropdown');
            dropdown.classList.toggle('show');
        }

        // 从下拉菜单设置主题
        function setThemeFromDropdown(theme, element) {
            setTheme(theme);
            updateDropdownThemeUI(theme);
            showToast('已切换到' + getThemeName(theme));
        }

        function updateDropdownThemeUI(theme) {
            document.querySelectorAll('.theme-option').forEach(el => el.classList.remove('active'));
            const activeOption = document.querySelector(`.theme-option[onclick*="${theme}"]`);
            if (activeOption) activeOption.classList.add('active');
        }

        function getThemeName(theme) {
            const names = {
                'dark': '暗黑模式',
                'light': '明亮模式',
                'pink': '粉色模式'
            };
            return names[theme] || theme;
        }

        // 主题切换
        function setTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        // 播放视频
        function playVideo(id) {
            const video = allVideos.find(v => v.id === id);
            if (!video) return;
            
            document.getElementById('playerModal').classList.add('active');
            
            if (dp) dp.destroy();
            
            dp = new DPlayer({
                container: document.getElementById('dplayer'),
                video: {
                    url: 'http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4',
                    pic: video.cover
                },
                autoplay: true,
                theme: '#00be06'
            });
        }

        function closePlayer() {
            document.getElementById('playerModal').classList.remove('active');
            if (dp) {
                dp.destroy();
                dp = null;
            }
        }

        // Toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 启动
        window.onload = init;
    </script>

</body>
</html>
