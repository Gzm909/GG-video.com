    <style>
        * { 
            font-family: 'Noto Sans SC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .gradient-text { 
            background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        .video-card { 
            transition: all 0.3s ease; 
            cursor: pointer; 
        }
        .video-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2); 
        }
        .video-card:active { 
            transform: scale(0.95); 
        }
        
        @keyframes vip-shine { 
            0% { background-position: -200% center; } 
            100% { background-position: 200% center; } 
        }
        
        .vip-badge { 
            background: linear-gradient(90deg, #fbbf24, #f59e0b, #fbbf24); 
            background-size: 200% auto; 
            animation: vip-shine 3s linear infinite; 
        }
        
        .page { 
            display: none; 
            opacity: 0; 
            transition: opacity 0.3s ease; 
        }
        .page.active { 
            display: block; 
            opacity: 1; 
        }
        
        #toast { 
            position: fixed; 
            top: 80px; 
            left: 50%; 
            transform: translateX(-50%) translateY(-100px); 
            opacity: 0; 
            transition: all 0.3s ease; 
            z-index: 10000; 
        }
        #toast.show { 
            transform: translateX(-50%) translateY(0); 
            opacity: 1; 
        }
        
        .nav-item { 
            transition: all 0.3s ease; 
        }
        .nav-item:hover { 
            transform: translateY(-2px); 
        }

        /* ========== 播放器样式 - 优化版 ========== */
        #videoPlayerModal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
            background: #000;
            display: none;
        }

        #videoPlayerModal.active {
            display: flex;
            flex-direction: column;
        }

        /* 播放器头部 */
        .player-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            pointer-events: none;
        }

        .player-header > * {
            pointer-events: auto;
        }

        /* 播放器主体区域 */
        .player-body {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* DPlayer 容器 */
        #dplayerContainer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
        }

        /* 强制 DPlayer 全高显示 */
        #dplayerContainer .dplayer {
            width: 100% !important;
            height: 100% !important;
            position: relative !important;
        }

        /* 视频区域 */
        #dplayerContainer .dplayer-video-wrap {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 40px !important;
            width: 100% !important;
            height: calc(100% - 40px) !important;
        }

        /* 控制栏 - 固定在底部 */
        #dplayerContainer .dplayer-controller {
            position: absolute !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            height: 40px !important;
            padding: 0 10px !important;
            background: rgba(0, 0, 0, 0.8) !important;
            display: flex !important;
            align-items: center !important;
            z-index: 101 !important;
        }

        /* ========== 进度条美化 ========== */
        #dplayerContainer .dplayer-bar-wrap {
            flex: 1 !important;
            margin: 0 10px !important;
            height: 4px !important;
            background: rgba(255,255,255,0.2) !important; /* 未播放部分 - 灰色 */
            border-radius: 2px !important;
            cursor: pointer !important;
            position: relative !important;
        }

        #dplayerContainer .dplayer-bar {
            height: 100% !important;
            background: #00d4ff !important; /* 已播放部分 - 主题色 */
            border-radius: 2px !important;
            position: relative !important;
        }

        #dplayerContainer .dplayer-thumb {
            width: 12px !important;
            height: 12px !important;
            background: #00d4ff !important;
            border-radius: 50% !important;
            position: absolute !important;
            right: -6px !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5) !important;
            transition: transform 0.2s !important;
        }

        #dplayerContainer .dplayer-bar-wrap:hover .dplayer-thumb {
            transform: translateY(-50%) scale(1.2) !important;
        }

        /* 缓冲条颜色 */
        #dplayerContainer .dplayer-loaded {
            background: rgba(255,255,255,0.1) !important;
            border-radius: 2px !important;
        }

        /* 按钮样式 */
        #dplayerContainer .dplayer-icons {
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
        }

        #dplayerContainer .dplayer-icon {
            width: 32px !important;
            height: 32px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            color: #fff !important;
            opacity: 0.9 !important;
            transition: opacity 0.2s !important;
        }

        #dplayerContainer .dplayer-icon:hover {
            opacity: 1 !important;
            color: #00d4ff !important;
        }

        /* ========== 音量按钮修复 ========== */
        #dplayerContainer .dplayer-volume {
            position: relative !important;
            display: flex !important;
            align-items: center !important;
            cursor: pointer !important;
        }

        #dplayerContainer .dplayer-volume-bar-wrap {
            width: 0 !important;
            height: 30px !important;
            overflow: hidden !important;
            transition: width 0.3s ease !important;
            display: flex !important;
            align-items: center !important;
        }

        #dplayerContainer .dplayer-volume:hover .dplayer-volume-bar-wrap,
        #dplayerContainer .dplayer-volume.dplayer-volume-active .dplayer-volume-bar-wrap {
            width: 60px !important;
            margin-left: 8px !important;
        }

        #dplayerContainer .dplayer-volume-bar {
            width: 60px !important;
            height: 4px !important;
            background: rgba(255,255,255,0.2) !important;
            border-radius: 2px !important;
            position: relative !important;
            cursor: pointer !important;
        }

        #dplayerContainer .dplayer-volume-bar-inner {
            height: 100% !important;
            background: #00d4ff !important;
            border-radius: 2px !important;
            position: relative !important;
        }

        #dplayerContainer .dplayer-volume-bar-inner::after {
            content: '' !important;
            position: absolute !important;
            right: -6px !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            width: 12px !important;
            height: 12px !important;
            background: #00d4ff !important;
            border-radius: 50% !important;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.5) !important;
        }

        /* 时间显示 */
        #dplayerContainer .dplayer-time {
            color: #fff !important;
            font-size: 12px !important;
            font-family: 'Courier New', monospace !important;
            margin: 0 8px !important;
            min-width: 85px !important;
            text-align: center !important;
        }

        /* 全屏按钮 */
        #dplayerContainer .dplayer-full-icon {
            margin-left: 8px !important;
        }

        /* 设置按钮 */
        #dplayerContainer .dplayer-setting-icon {
            margin-left: 8px !important;
        }

        /* ========== 播放按钮缩小 ========== */
        #dplayerContainer .dplayer-play-icon {
            position: absolute !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            width: 50px !important; /* 从80px缩小到50px */
            height: 50px !important;
            background: rgba(0, 212, 255, 0.9) !important;
            border-radius: 50% !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            z-index: 99 !important;
            transition: all 0.2s ease !important;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4) !important;
        }

        #dplayerContainer .dplayer-play-icon:hover {
            transform: translate(-50%, -50%) scale(1.1) !important;
            background: #00d4ff !important;
        }

        #dplayerContainer .dplayer-play-icon svg {
            width: 20px !important; /* 图标也相应缩小 */
            height: 20px !important;
            margin-left: 2px !important;
        }

        /* 加载动画 */
        #dplayerContainer .dplayer-bezel {
            position: absolute !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            z-index: 98 !important;
        }

        /* 隐藏弹幕相关元素 */
        #dplayerContainer .dplayer-danmaku {
            display: none !important;
        }
        
        #dplayerContainer .dplayer-danmaku-bar {
            display: none !important;
        }
        
        #dplayerContainer .dplayer-comment {
            display: none !important;
        }
        
        #dplayerContainer .dplayer-comment-box {
            display: none !important;
        }
    </style>

                </button>
            </div>
            <form id="authForm" onsubmit="handleAuth(event)" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-700 dark:text-gray-300 mb-2">账号</label>
                    <input type="text" id="authUsername" required class="w-full px-4 py-3 rounded-xl bg-gray-100 dark:bg-darker border-2 border-transparent focus:border-primary outline-none transition-colors" placeholder="请输入账号（至少3位）">
                </div>
                <div>
                    <label class="block text-sm text-gray-700 dark:text-gray-300 mb-2">密码</label>
                    <input type="password" id="authPassword" required class="w-full px-4 py-3 rounded-xl bg-gray-100 dark:bg-darker border-2 border-transparent focus:border-primary outline-none transition-colors" placeholder="请输入密码（至少6位）">
                </div>
                <div id="registerFields" class="hidden space-y-4">
                    <div>
                        <label class="block text-sm text-gray-700 dark:text-gray-300 mb-2">确认密码</label>
                        <input type="password" id="authPasswordConfirm" class="w-full px-4 py-3 rounded-xl bg-gray-100 dark:bg-darker border-2 border-transparent focus:border-primary outline-none transition-colors" placeholder="请再次输入密码">
                    </div>
                </div>
                <div id="authError" class="hidden text-red-400 text-sm text-center bg-red-400/10 py-2 rounded-lg"></div>
                <button type="submit" class="w-full py-3.5 bg-primary text-black font-bold rounded-xl shadow-lg hover:scale-[1.02] active:scale-95 transition-transform">
                    <span id="authSubmitText">登录</span>
                </button>
            </form>
            <div class="mt-6 text-center space-y-3">
                <button onclick="toggleAuthMode()" class="text-sm text-primary hover:underline font-medium" id="authToggleBtn">
                    还没有账号？立即注册
                </button>
            </div>
        </div>
    </div>

    <!-- ========== 视频播放模态框（优化版） ========== -->
    <div id="videoPlayerModal">
        <!-- 顶部标题栏 -->
        <div class="player-header">
            <button onclick="closeVideoPlayer()" class="text-white w-10 h-10 flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 transition-colors">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h3 class="text-white font-medium truncate flex-1 mx-4 text-center text-sm" id="playerTitle">视频标题</h3>
            <button onclick="showToast('更多功能开发中')" class="text-white w-10 h-10 flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 transition-colors">
                <i class="fas fa-ellipsis-h"></i>
            </button>
        </div>
        
        <!-- 播放器主体 -->
        <div class="player-body">
            <div id="dplayerContainer"></div>
        </div>
    </div>

    <!-- VIP限制提示模态框 -->
    <div id="vipLimitModal" class="hidden fixed inset-0 z-[70] flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="glass rounded-2xl p-6 w-full max-w-sm mx-4 text-center">
            <i class="fas fa-crown text-5xl text-amber-500 mb-4"></i>
            <h3 class="text-xl font-bold mb-2">VIP专享内容</h3>
            <p class="text-gray-400 text-sm mb-6">该视频为VIP专享，开通会员后即可观看</p>
            <div class="space-y-3">
                <button onclick="closeVipLimit(); showPage('vip')" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-xl font-bold">
                    了解VIP会员
                </button>
                <button onclick="closeVipLimit()" class="w-full py-3 bg-gray-700 text-white rounded-xl">
                    暂不观看
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 pointer-events-none">
        <i id="toastIcon" class="fas fa-check-circle text-green-400"></i>
        <span id="toastMessage">操作成功</span>
    </div>

    <script>
        // ========== 全局配置 ==========
        let videoList = [];
        let currentCategory = 'all';
        let currentUser = null;
        let currentVideo = null;
        let dp = null;
        let isRegisterMode = false;

        // ========== 工具函数 ==========
        function safeGet(key, def) {
            try {
                const d = localStorage.getItem(key);
                return d ? JSON.parse(d) : def;
            } catch(e) { return def; }
        }

        function formatSize(bytes) {
            if (!bytes) return '';
            const u = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(1) + u[i];
        }

        // ========== 时钟 ==========
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                String(now.getHours()).padStart(2, '0') + ':' + 
                String(now.getMinutes()).padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ========== 主题 ==========
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }

        // ========== 页面导航 ==========
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(item => {
                const icon = item.querySelector('i');
                const text = item.querySelector('span');
                if (item.dataset.page === pageName) {
                    icon.classList.remove('text-gray-400');
                    icon.classList.add('text-primary');
                    text.classList.remove('text-gray-400');
                    text.classList.add('text-primary');
                } else {
                    icon.classList.add('text-gray-400');
                    icon.classList.remove('text-primary');
                    text.classList.add('text-gray-400');
                    text.classList.remove('text-primary');
                }
            });

            if (pageName === 'home') loadVideos();
        }

        // ========== 视频加载 ==========
        function loadVideos() {
            videoList = safeGet('gdx_videos', []);
            console.log('加载视频列表:', videoList.length, '个');
            
            if (videoList.length === 0) {
                document.getElementById('hotVideos').innerHTML = `
                    <div class="col-span-3 text-center py-8 text-gray-500">
                        <i class="fas fa-video-slash text-4xl mb-2"></i>
                        <p>暂无视频</p>
                        <p class="text-xs mt-1">请在管理平台上传视频</p>
                    </div>
                `;
                document.getElementById('newVideos').innerHTML = '';
                document.getElementById('bannerContainer').innerHTML = `
                    <div class="w-full h-full flex items-center justify-center bg-gray-800 text-gray-500">
                        <p>暂无推荐内容</p>
                    </div>
                `;
                return;
            }

            renderBanner();
            renderHotVideos();
            renderNewVideos();
        }

        function renderBanner() {
            const bannerVideo = videoList.filter(v => v.isVip).pop() || videoList[videoList.length - 1];
            if (!bannerVideo) return;

            document.getElementById('bannerContainer').innerHTML = `
                <div class="relative w-full h-full group cursor-pointer" onclick="playVideoById(${bannerVideo.id})">
                    <img src="${bannerVideo.coverUrl || bannerVideo.cover}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" 
                         onerror="this.src='https://via.placeholder.com/800x480?text=No+Cover'">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 p-4 w-full">
                        ${bannerVideo.isVip ? '<span class="vip-badge px-2 py-0.5 rounded text-xs font-bold text-black mb-1 inline-block">VIP</span>' : ''}
                        <h3 class="text-white font-bold text-lg">${bannerVideo.title}</h3>
                        <p class="text-gray-300 text-xs mt-1">${bannerVideo.rating || 8.0}分 · ${getCategoryName(bannerVideo.category)}</p>
                    </div>
                </div>
            `;
        }

        function renderHotVideos() {
            const container = document.getElementById('hotVideos');
            let displayVideos = currentCategory === 'all' 
                ? videoList 
                : videoList.filter(v => v.category === currentCategory);

            displayVideos = displayVideos.slice(0, 6);

            if (displayVideos.length === 0) {
                container.innerHTML = '<div class="col-span-3 text-center py-8 text-gray-500">该分类暂无视频</div>';
                return;
            }

            container.innerHTML = displayVideos.map(v => `
                <div class="video-card" onclick="playVideoById(${v.id})">
                    <div class="relative rounded-lg overflow-hidden aspect-[3/4]">
                        <img src="${v.coverUrl || v.cover}" class="w-full h-full object-cover" 
                             onerror="this.src='https://via.placeholder.com/300x400?text=No+Cover'">
                        ${v.isVip ? '<div class="absolute top-1 left-1 vip-badge px-1.5 py-0.5 rounded text-[10px] font-bold text-black">VIP</div>' : ''}
                        <div class="absolute bottom-1 right-1 bg-black/60 px-1 rounded text-[10px] text-white">${v.rating || 8.0}分</div>
                    </div>
                    <h3 class="mt-2 text-sm font-medium line-clamp-1">${v.title}</h3>
                    <p class="text-xs text-gray-500 mt-0.5">${getCategoryName(v.category)}</p>
                </div>
            `).join('');
        }

        function renderNewVideos() {
            const container = document.getElementById('newVideos');
            const newVideos = videoList.slice(-4).reverse();

            if (newVideos.length === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = newVideos.map(v => `
                <div class="flex gap-3 cursor-pointer" onclick="playVideoById(${v.id})">
                    <div class="w-32 h-20 rounded-lg overflow-hidden flex-shrink-0 relative">
                        <img src="${v.coverUrl || v.cover}" class="w-full h-full object-cover" 
                             onerror="this.src='https://via.placeholder.com/320x180?text=No+Cover'">
                        <div class="absolute inset-0 flex items-center justify-center bg-black/20">
                            <i class="fas fa-play-circle text-white/80 text-2xl"></i>
                        </div>
                    </div>
                    <div class="flex-1 py-1">
                        <h3 class="font-medium line-clamp-1">${v.title}</h3>
                        <p class="text-xs text-gray-500 mt-1 line-clamp-2">${v.desc || '暂无简介'}</p>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="text-xs text-primary">${v.rating || 8.0}分</span>
                            ${v.isVip ? '<span class="vip-badge px-1.5 py-0.5 rounded text-[10px] font-bold text-black">VIP</span>' : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-tab').forEach(btn => {
                if (btn.dataset.category === category) {
                    btn.classList.remove('bg-gray-200', 'dark:bg-surface', 'text-gray-600', 'dark:text-gray-300');
                    btn.classList.add('bg-primary', 'text-white');
                } else {
                    btn.classList.add('bg-gray-200', 'dark:bg-surface', 'text-gray-600', 'dark:text-gray-300');
                    btn.classList.remove('bg-primary', 'text-white');
                }
            });
            renderHotVideos();
        }

        function getCategoryName(cat) {
            const map = { movie: '电影', tv: '电视剧', variety: '综艺', anime: '动漫', documentary: '纪录片' };
            return map[cat] || cat || '其他';
        }

        // ========== 视频播放（优化版） ==========
        function playVideoById(id) {
            const video = videoList.find(v => v.id === id);
            if (!video) {
                showToast('视频不存在', 'error');
                return;
            }

            // VIP权限检查
            if (video.isVip && !currentUser?.isVip) {
                document.getElementById('vipLimitModal').classList.remove('hidden');
                return;
            }

            currentVideo = video;
            document.getElementById('playerTitle').textContent = video.title;
            
            // 显示播放器
            const modal = document.getElementById('videoPlayerModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            // 销毁旧实例
            if (dp) {
                dp.destroy();
                dp = null;
            }

            const videoUrl = video.videoUrl || video.url;
            console.log('播放视频:', videoUrl);

            // 延迟初始化确保DOM就绪
            setTimeout(() => {
                const container = document.getElementById('dplayerContainer');
                
                // 强制清空容器
                container.innerHTML = '';
                
                dp = new DPlayer({
                    container: container,
                    video: {
                        url: videoUrl,
                        type: 'auto',
                        pic: video.coverUrl || video.cover
                    },
                    autoplay: true,
                    theme: '#00d4ff',
                    lang: 'zh-cn',
                    preload: 'auto',
                    screenshot: true,
                    volume: 0.8,
                    controls: true,
                    loop: false,
                    hotkey: true,
                    // 禁用弹幕
                    danmaku: null,
                    contextmenu: [
                        { text: 'GDX视频平台', link: '#' }
                    ]
                });

                // 错误处理
                dp.on('error', () => {
                    showToast('视频加载失败，请检查网络', 'error');
                });

            }, 100);

            addToHistory(video);
        }

        function closeVideoPlayer() {
            const modal = document.getElementById('videoPlayerModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
            
            if (dp) {
                dp.destroy();
                dp = null;
            }
        }

        function closeVipLimit() {
            document.getElementById('vipLimitModal').classList.add('hidden');
        }

        function addToHistory(video) {
            let history = safeGet('gdx_watch_history', []);
            history = history.filter(h => h.id !== video.id);
            history.unshift({ ...video, watchedAt: new Date().toISOString() });
            if (history.length > 50) history = history.slice(0, 50);
            localStorage.setItem('gdx_watch_history', JSON.stringify(history));
            updateHistoryCount();
        }

        function updateHistoryCount() {
            const history = safeGet('gdx_watch_history', []);
            document.getElementById('historyCount').textContent = history.length;
        }

        // ========== 用户系统 ==========
        function getAccountsFromPlatform() {
            const data = localStorage.getItem('gdx_users');
            if (data) {
                try {
                    const users = JSON.parse(data);
                    const accounts = {};
                    users.forEach(u => {
                        accounts[u.username] = { password: u.password, isVip: u.isVip };
                    });
                    return accounts;
                } catch (e) {}
            }
            return {
                'GDX': { password: '666', isVip: true },
                'user001': { password: '123456', isVip: true },
                'test': { password: 'test123', isVip: false }
            };
        }

        function showAuthModal() {
            document.getElementById('authModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            isRegisterMode = false;
            updateAuthUI();
        }

        function showRegisterModal() {
            document.getElementById('authModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            isRegisterMode = true;
            updateAuthUI();
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.add('hidden');
            document.body.style.overflow = '';
            document.getElementById('authForm').reset();
            document.getElementById('authError').classList.add('hidden');
        }

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            updateAuthUI();
            document.getElementById('authError').classList.add('hidden');
        }

        function updateAuthUI() {
            const title = document.getElementById('authTitle');
            const submitText = document.getElementById('authSubmitText');
            const toggleBtn = document.getElementById('authToggleBtn');
            const registerFields = document.getElementById('registerFields');

            if (isRegisterMode) {
                title.textContent = '注册账号';
                submitText.textContent = '立即注册';
                toggleBtn.textContent = '已有账号？立即登录';
                registerFields.classList.remove('hidden');
            } else {
                title.textContent = '登录';
                submitText.textContent = '登录';
                toggleBtn.textContent = '还没有账号？立即注册';
                registerFields.classList.add('hidden');
            }
        }

        function handleAuth(e) {
            e.preventDefault();
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            const errorDiv = document.getElementById('authError');

            if (username.length < 3) {
                errorDiv.textContent = '账号至少需要3个字符';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = '密码至少需要6个字符';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (isRegisterMode) {
                const confirmPassword = document.getElementById('authPasswordConfirm').value;
                if (password !== confirmPassword) {
                    errorDiv.textContent = '两次输入的密码不一致';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                const accounts = getAccountsFromPlatform();
                if (accounts[username]) {
                    errorDiv.textContent = '该账号已被注册';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                const newUser = {
                    id: Date.now(),
                    username: username,
                    password: password,
                    isVip: false,
                    createdAt: new Date().toISOString()
                };

                let users = safeGet('gdx_users', []);
                users.push(newUser);
                localStorage.setItem('gdx_users', JSON.stringify(users));
                
                window.dispatchEvent(new StorageEvent('storage', {
                    key: 'gdx_users',
                    newValue: JSON.stringify(users)
                }));

                errorDiv.textContent = '注册成功！请登录';
                errorDiv.className = 'text-green-400 text-sm text-center bg-green-400/10 py-2 rounded-lg';
                errorDiv.classList.remove('hidden');
                
                setTimeout(() => {
                    isRegisterMode = false;
                    updateAuthUI();
                    document.getElementById('authPassword').value = '';
                    document.getElementById('authPasswordConfirm').value = '';
                    errorDiv.classList.add('hidden');
                }, 1500);

            } else {
                const accounts = getAccountsFromPlatform();

                if (accounts[username] && accounts[username].password === password) {
                    currentUser = {
                        username: username,
                        isVip: accounts[username].isVip
                    };
                    localStorage.setItem('gdx_app_user', JSON.stringify(currentUser));
                    updateUIForLoggedInUser();
                    closeAuthModal();
                    showToast('登录成功！');
                } else {
                    errorDiv.textContent = '账号或密码错误！';
                    errorDiv.classList.remove('hidden');
                }
            }
        }

        function updateUIForLoggedInUser() {
            if (!currentUser) return;

            document.getElementById('guestView').classList.add('hidden');
            document.getElementById('loggedInView').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('displayUsername').textContent = currentUser.username;

            const avatar = document.getElementById('userAvatar');
            avatar.innerHTML = `<span class="text-3xl font-bold text-white">${currentUser.username.charAt(0).toUpperCase()}</span>`;
            avatar.classList.remove('bg-gray-200', 'dark:bg-surface');
            avatar.classList.add('bg-gradient-to-br', 'from-primary', 'to-secondary');

            document.getElementById('headerAvatar').innerHTML = `<span class="font-bold">${currentUser.username.charAt(0).toUpperCase()}</span>`;

            const vipBadge = document.getElementById('userVipBadge');
            if (currentUser.isVip) {
                vipBadge.classList.remove('hidden');
            } else {
                vipBadge.classList.add('hidden');
            }

            updateHistoryCount();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('gdx_app_user');

            document.getElementById('guestView').classList.remove('hidden');
            document.getElementById('loggedInView').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');

            const avatar = document.getElementById('userAvatar');
            avatar.innerHTML = '<i class="fas fa-user text-gray-400"></i>';
            avatar.classList.add('bg-gray-200', 'dark:bg-surface');
            avatar.classList.remove('bg-gradient-to-br', 'from-primary', 'to-secondary');

            document.getElementById('headerAvatar').innerHTML = '<i class="fas fa-user"></i>';

            showToast('已退出登录');
        }

        // ========== Toast ==========
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            msg.textContent = message;
            icon.className = type === 'error' ? 'fas fa-exclamation-circle text-red-400' : 'fas fa-check-circle text-green-400';
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ========== 初始化 ==========
        window.onload = function() {
            const saved = localStorage.getItem('gdx_app_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                updateUIForLoggedInUser();
            }
            
            loadVideos();
            updateHistoryCount();

            // 监听视频数据变化
            window.addEventListener('storage', function(e) {
                if (e.key === 'gdx_videos') {
                    console.log('检测到新视频，刷新列表');
                    loadVideos();
                    showToast('视频列表已更新');
                }
            });
        };

        // 页面可见时刷新
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                loadVideos();
            }
        });
    </script>
</body>
</html>
