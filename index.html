<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GDX - 下一代视频娱乐平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/dplayer@1.27.1/dist/DPlayer.min.css">
    <script src="https://unpkg.com/hls.js@1.4.12/dist/hls.min.js"></script>
    <script src="https://unpkg.com/dplayer@1.27.1/dist/DPlayer.min.js"></script>
    <style>
        * { 
            font-family: 'Inter', 'Noto Sans SC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ==================== 主题变量 ==================== */
        :root {
            --primary: #00be06;
            --secondary: #7b2cbf;
            --accent: #ff006e;
            --dark: #0a0a0f;
            --surface: #12121a;
            --elevated: #1a1a25;
            --border: rgba(255,255,255,0.08);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --indicator-active: #00be06;
            --indicator-inactive: #6b7280;
        }
        
        [data-theme="light"] {
            --primary: #00be06;
            --secondary: #00a806;
            --accent: #FFD700;
            --dark: #f3f4f6;
            --surface: #ffffff;
            --elevated: #f9fafb;
            --border: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
        }
        
        [data-theme="pink"] {
            --primary: #ec4899;
            --secondary: #db2777;
            --accent: #f472b6;
            --dark: #fdf2f8;
            --surface: #ffffff;
            --elevated: #fce7f3;
            --border: #fbcfe8;
            --text-primary: #831843;
            --text-secondary: #be185d;
        }
        
        body {
            background: var(--dark);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }
        
        /* ==================== 左侧 Dock 栏（120px） ==================== */
        .side-dock {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 120px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }
        
        /* 顶部横向导航 - GDX + 导航项 */
        .dock-top {
            height: 56px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0 12px;
            gap: 16px;
        }
        
        .dock-logo {
            font-size: 18px;
            font-weight: 900;
            color: var(--primary);
            margin-right: 8px;
        }
        
        .dock-top-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px 8px;
            border-radius: 6px;
        }
        
        .dock-top-item:hover, .dock-top-item.active {
            color: var(--primary);
            background: rgba(0,190,6,0.1);
        }
        
        .dock-top-item i {
            font-size: 14px;
        }
        
        /* 中部垂直分类 */
        .dock-categories {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
        }
        
        .dock-cat-item {
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .dock-cat-item:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }
        
        .dock-cat-item.active {
            color: var(--primary);
            background: rgba(0,190,6,0.1);
        }
        
        .dock-cat-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--primary);
            border-radius: 0 3px 3px 0;
        }
        
        /* 底部主题切换 - 竖向圆形按钮 */
        .dock-bottom {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .theme-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .theme-btn:hover {
            transform: scale(1.1);
        }
        
        .theme-btn.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary);
        }
        
        /* ==================== 主内容区 ==================== */
        .main-content {
            margin-left: 120px;
            min-height: 100vh;
        }
        
        /* 顶部固定栏 - 修复：使用CSS变量支持主题切换 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 120px;
            right: 0;
            height: 56px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            transition: background-color 0.3s, border-color 0.3s;
        }
        
        /* ==================== 正在热播 - 横向大卡片轮播 ==================== */
        .hero-section {
            padding: 80px 24px 24px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title i {
            color: var(--primary);
        }
        
        .hot-scroll {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            padding-bottom: 20px;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        
        .hot-card {
            flex-shrink: 0;
            width: 640px;
            height: 360px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            scroll-snap-align: start;
        }
        
        .hot-card:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        .hot-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .hot-card .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px;
        }
        
        .hot-card .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0,190,6,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .hot-card:hover .play-btn {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .hot-card .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .hot-card .meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        /* 轮播指示器 */
        .carousel-indicators {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        
        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--indicator-inactive);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .carousel-dot.active {
            background: var(--indicator-active);
            width: 24px;
            border-radius: 4px;
        }
        
        /* ==================== 分类区块 - 4列小网格 ==================== */
        .category-section {
            padding: 24px;
            scroll-margin-top: 80px;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        
        .video-card {
            border-radius: 12px;
            overflow: hidden;
            background: var(--elevated);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
        }
        
        .video-card .thumb {
            aspect-ratio: 16/9;
            position: relative;
            overflow: hidden;
        }
        
        .video-card .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        
        .video-card:hover .thumb img {
            transform: scale(1.1);
        }
        
        .video-card .info {
            padding: 12px;
        }
        
        .video-card .title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .video-card .meta {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* 标签 */
        .badge-vip {
            position: absolute;
            top: 8px;
            left: 8px;
            padding: 4px 8px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            font-size: 10px;
            font-weight: 800;
            border-radius: 4px;
        }
        
        .badge-rating {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: #FFD700;
            font-size: 12px;
            font-weight: 700;
            border-radius: 4px;
        }
        
        /* ==================== 页面内容区域 ==================== */
        .page-content {
            display: none;
        }
        
        .page-content.active {
            display: block;
        }
        
        /* ==================== 播放器 ==================== */
        .player-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #000;
            display: none;
        }
        
        .player-modal.active {
            display: flex;
            flex-direction: column;
        }
        
        #dplayer {
            flex: 1;
        }
        
        /* ==================== Toast ==================== */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--surface);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid var(--border);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1001;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <script>

    <nav class="side-dock">

    <!-- JavaScript -->
    <script>
        // 示例数据
        const sampleImages = [
            'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=800&h=450&fit=crop',
            'https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?w=800&h=450&fit=crop',
            'https://images.unsplash.com/photo-1518676590629-3dcbd9c5a5c9?w=800&h=450&fit=crop',
            'https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=400&h=225&fit=crop',
            'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400&h=225&fit=crop',
            'https://images.unsplash.com/photo-1516280440614-6697288d5d38?w=400&h=225&fit=crop'
        ];

        function generateVideos() {
            const categories = ['movie', 'tv', 'variety', 'anime', 'documentary'];
            const titles = {
                movie: ['星际穿越', '盗梦空间', '肖申克的救赎', '阿甘正传', '泰坦尼克号'],
                tv: ['狂飙', '三体', '隐秘的角落', '庆余年', '漫长的季节'],
                variety: ['乐队的夏天', '脱口秀大会', '奇葩说', '向往的生活', '奔跑吧'],
                anime: ['千与千寻', '你的名字', '鬼灭之刃', '进击的巨人', '间谍过家家'],
                documentary: ['地球脉动', '舌尖上的中国', '我在故宫修文物', '人间世', '航拍中国']
            };
            
            let videos = [];
            let id = 1;
            
            categories.forEach(cat => {
                titles[cat].forEach((title, idx) => {
                    videos.push({
                        id: id++,
                        title: title,
                        category: cat,
                        cover: sampleImages[idx % sampleImages.length],
                        rating: (8 + Math.random() * 2).toFixed(1),
                        isVip: Math.random() > 0.5,
                        views: Math.floor(Math.random() * 1000000)
                    });
                });
            });
            
            return videos;
        }

        const allVideos = generateVideos();
        let dp = null;
        let hotVideos = [];

        // 初始化
        function init() {
            // 读取保存的主题
            const savedTheme = localStorage.getItem('theme') || 'dark';
            setTheme(savedTheme, document.querySelector(`.theme-btn[onclick*="${savedTheme}"]`));
            
            renderHotSection();
            renderCategorySections();
            renderDiscoverPage();
            renderVipPage();
            setupScrollSpy();
        }

        // 渲染正在热播（横向大卡片轮播）
        function renderHotSection() {
            hotVideos = allVideos.filter(v => v.isVip).slice(0, 5);
            const container = document.getElementById('hotContainer');
            const indicatorsContainer = document.getElementById('carouselIndicators');
            
            container.innerHTML = hotVideos.map((v, index) => `
                <div class="hot-card" data-index="${index}" onclick="playVideo(${v.id})">
                    <img src="${v.cover}" alt="${v.title}">
                    <div class="overlay">
                        <div class="play-btn">
                            <i class="fas fa-play text-2xl text-white ml-1"></i>
                        </div>
                        <div class="title">${v.title}</div>
                        <div class="meta">
                            <span class="text-amber-400"><i class="fas fa-star mr-1"></i>${v.rating}</span>
                            <span>${(v.views / 10000).toFixed(1)}万次播放</span>
                            <span class="px-2 py-1 bg-white/20 rounded text-xs">${v.isVip ? 'VIP' : '免费'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // 生成指示器
            indicatorsContainer.innerHTML = hotVideos.map((_, index) => `
                <div class="carousel-dot ${index === 0 ? 'active' : ''}" onclick="goToCarouselSlide(${index})"></div>
            `).join('');
            
            // 启动自动轮播
            startCarousel();
            
            // 监听滚动更新指示器
            container.addEventListener('scroll', updateCarouselIndicator);
        }

        // 启动自动轮播
        function startCarousel() {
            if (carouselInterval) clearInterval(carouselInterval);
            carouselInterval = setInterval(() => {
                const container = document.getElementById('hotContainer');
                const nextIndex = (currentCarouselIndex + 1) % hotVideos.length;
                goToCarouselSlide(nextIndex);
            }, 5000);
        }

        // 跳转到指定轮播项
        function goToCarouselSlide(index) {
            const container = document.getElementById('hotContainer');
            const cards = container.querySelectorAll('.hot-card');
            if (cards[index]) {
                cards[index].scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
                currentCarouselIndex = index;
                updateCarouselIndicator();
            }
        }

        // 更新轮播指示器
        function updateCarouselIndicator() {
            const container = document.getElementById('hotContainer');
            const dots = document.querySelectorAll('.carousel-dot');
            const cards = container.querySelectorAll('.hot-card');
            const scrollLeft = container.scrollLeft;
            const cardWidth = cards[0]?.offsetWidth + 24 || 664; // 卡片宽度 + gap
            
            const newIndex = Math.round(scrollLeft / cardWidth);
            if (newIndex !== currentCarouselIndex && newIndex >= 0 && newIndex < hotVideos.length) {
                currentCarouselIndex = newIndex;
            }
            
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentCarouselIndex);
            });
        }

        // 渲染各分类区块
        function renderCategorySections() {
            const categories = ['recommend', 'movie', 'tv', 'variety', 'anime', 'documentary'];
            
            categories.forEach(cat => {
                let videos;
                if (cat === 'recommend') {
                    videos = allVideos.sort(() => Math.random() - 0.5).slice(0, 8);
                } else {
                    videos = allVideos.filter(v => v.category === cat).slice(0, 8);
                }
                
                const container = document.getElementById('grid-' + cat);
                if (container) {
                    container.innerHTML = videos.map(v => `
                        <div class="video-card" onclick="playVideo(${v.id})">
                            <div class="thumb">
                                <img src="${v.cover}" alt="${v.title}">
                                ${v.isVip ? '<div class="badge-vip">VIP</div>' : ''}
                                <div class="badge-rating"><i class="fas fa-star mr-1"></i>${v.rating}</div>
                            </div>
                            <div class="info">
                                <div class="title">${v.title}</div>
                                <div class="meta">${(v.views / 10000).toFixed(1)}万次播放</div>
                            </div>
                        </div>
                    `).join('');
                }
            });
        }

        // 渲染发现页面
        function renderDiscoverPage() {
            const container = document.getElementById('grid-discover');
            if (container) {
                const videos = allVideos.sort(() => Math.random() - 0.5).slice(0, 12);
                container.innerHTML = videos.map(v => `
                    <div class="video-card" onclick="playVideo(${v.id})">
                        <div class="thumb">
                            <img src="${v.cover}" alt="${v.title}">
                            ${v.isVip ? '<div class="badge-vip">VIP</div>' : ''}
                            <div class="badge-rating"><i class="fas fa-star mr-1"></i>${v.rating}</div>
                        </div>
                        <div class="info">
                            <div class="title">${v.title}</div>
                            <div class="meta">${(v.views / 10000).toFixed(1)}万次播放</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // 渲染VIP页面
        function renderVipPage() {
            const container = document.getElementById('grid-vip');
            if (container) {
                const videos = allVideos.filter(v => v.isVip).slice(0, 12);
                container.innerHTML = videos.map(v => `
                    <div class="video-card" onclick="playVideo(${v.id})">
                        <div class="thumb">
                            <img src="${v.cover}" alt="${v.title}">
                            <div class="badge-vip">VIP</div>
                            <div class="badge-rating"><i class="fas fa-star mr-1"></i>${v.rating}</div>
                        </div>
                        <div class="info">
                            <div class="title">${v.title}</div>
                            <div class="meta">${(v.views / 10000).toFixed(1)}万次播放</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // 滚动到指定区块
        function scrollToSection(sectionId, element) {
            // 只在首页时启用滚动
            if (currentPage !== 'home') {
                switchTopNav('home', document.querySelector('.dock-top-item[onclick*="home"]'));
            }
            
            document.querySelectorAll('.dock-cat-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            const target = document.getElementById('section-' + sectionId);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 滚动监听（自动高亮左侧）
        function setupScrollSpy() {
            const sections = ['hot', 'recommend', 'movie', 'tv', 'variety', 'anime', 'documentary'];
            const catItems = document.querySelectorAll('.dock-cat-item');
            
            window.addEventListener('scroll', () => {
                if (currentPage !== 'home') return;
                
                const scrollPos = window.scrollY + 100;
                
                sections.forEach((section, index) => {
                    const element = document.getElementById('section-' + section);
                    if (element) {
                        const offsetTop = element.offsetTop;
                        const offsetBottom = offsetTop + element.offsetHeight;
                        
                        if (scrollPos >= offsetTop && scrollPos < offsetBottom) {
                            catItems.forEach(el => el.classList.remove('active'));
                            catItems[index].classList.add('active');
                        }
                    }
                });
            });
        }

        // 顶部导航切换 - 修复：实现页面切换逻辑
        function switchTopNav(nav, element) {
            document.querySelectorAll('.dock-top-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            currentPage = nav;
            
            // 隐藏所有页面
            document.querySelectorAll('.page-content').forEach(page => {
                page.classList.remove('active');
            });
            
            // 显示目标页面
            const targetPage = document.getElementById('page-' + nav);
            if (targetPage) {
                targetPage.classList.add('active');
            }
            
            // 控制左侧分类导航显示/隐藏
            const dockCategories = document.getElementById('dockCategories');
            if (dockCategories) {
                dockCategories.style.display = nav === 'home' ? 'flex' : 'none';
            }
            
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            showToast('切换到: ' + getNavName(nav));
        }

        function getNavName(nav) {
            const names = {
                'home': '首页',
                'discover': '发现',
                'vip': '会员',
                'profile': '我的'
            };
            return names[nav] || nav;
        }

        // 主题切换
        function setTheme(theme, element) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            if (element) element.classList.add('active');
        }

        // 播放视频
        function playVideo(id) {
            const video = allVideos.find(v => v.id === id);
            if (!video) return;
            
            document.getElementById('playerModal').classList.add('active');
            
            if (dp) dp.destroy();
            
            dp = new DPlayer({
                container: document.getElementById('dplayer'),
                video: {
                    url: 'http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4',
                    pic: video.cover
                },
                autoplay: true,
                theme: '#00be06'
            });
        }

        function closePlayer() {
            document.getElementById('playerModal').classList.remove('active');
            if (dp) {
                dp.destroy();
                dp = null;
            }
        }

        // Toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 启动
        window.onload = init;
    </script>

</body>
</html>
