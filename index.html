<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDX 视频管理平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes shake { 0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)} }
        .shake { animation: shake 0.5s; }
        
        /* 页面显示控制 */
        #loginPage {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        #loginPage.hidden {
            display: none !important;
        }
        
        #dashboardPage {
            display: none;
            min-height: 100vh;
        }
        
        #dashboardPage.active {
            display: block;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#00d4ff', secondary: '#7b2cbf', dark: '#0f172a', surface: '#1e293b' } } }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-blue-900 to-gray-900 min-h-screen text-white">

    <!-- 登录页 - 中央显示 -->
    <div id="loginPage">
        <div class="glass rounded-2xl p-8 w-full max-w-md shadow-2xl mx-4">
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center mb-4 text-white text-2xl font-bold">G</div>
                <h1 class="text-3xl font-bold gradient-text">GDX 管理平台</h1>
                <p class="text-gray-400 mt-2">超级管理员登录</p>
            </div>
            <form onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">超级账号</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-primary outline-none text-white" placeholder="请输入账号">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">密码</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-primary outline-none text-white" placeholder="请输入密码">
                </div>
                <div id="error" class="hidden text-red-400 text-sm text-center bg-red-400/10 py-2 rounded-lg"></div>
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-primary to-secondary rounded-xl font-bold hover:opacity-90 transition-opacity">登录系统</button>
            </form>
            <div class="mt-6 text-center text-xs text-gray-500">
                <p>超级账号：GDX | 密码：666</p>
            </div>
        </div>
    </div>

    <!-- 管理面板 -->
    <div id="dashboardPage">
        <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white font-bold">G</div>
                <span class="text-xl font-bold gradient-text">GDX 管理平台</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-400">超级管理员</span>
                <button onclick="logout()" class="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/30 text-sm">退出</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6 py-8">
            <div class="grid grid-cols-4 gap-6 mb-8">
                <div class="glass rounded-xl p-6">
                    <p class="text-gray-400 text-sm">总用户数</p>
                    <p class="text-3xl font-bold text-primary mt-2" id="totalUsers">0</p>
                </div>
                <div class="glass rounded-xl p-6">
                    <p class="text-gray-400 text-sm">VIP用户</p>
                    <p class="text-3xl font-bold text-secondary mt-2" id="vipUsers">0</p>
                </div>
                <div class="glass rounded-xl p-6">
                    <p class="text-gray-400 text-sm">普通用户</p>
                    <p class="text-3xl font-bold text-gray-400 mt-2" id="normalUsers">0</p>
                </div>
                <div class="glass rounded-xl p-6">
                    <p class="text-gray-400 text-sm">今日新增</p>
                    <p class="text-3xl font-bold text-green-400 mt-2">+0</p>
                </div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">账号管理</h2>
                <button onclick="openModal()" class="px-6 py-2 bg-primary text-black font-bold rounded-lg hover:scale-105 transition-transform">+ 添加账号</button>
            </div>

            <div class="glass rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-800/50">
                        <tr>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400">ID</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400">账号</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400">密码</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400">状态</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-700/50"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- 添加/编辑模态框 -->
    <div id="modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="glass rounded-2xl p-6 w-full max-w-md mx-4">
            <h3 class="text-xl font-bold mb-6" id="modalTitle">添加账号</h3>
            <form onsubmit="saveUser(event)" class="space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="newUsername" required class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-primary outline-none text-white" placeholder="账号">
                <input type="text" id="newPassword" required class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-primary outline-none text-white" placeholder="密码">
                <label class="flex items-center gap-3 text-gray-300">
                    <input type="checkbox" id="isVip" class="w-5 h-5 rounded bg-gray-800 border-gray-700 text-primary"> VIP账号
                </label>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 bg-gray-700 rounded-xl hover:bg-gray-600">取消</button>
                    <button type="submit" class="flex-1 py-3 bg-primary text-black font-bold rounded-xl">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 超级账号配置（已记住）
        const SUPER_ACCOUNT = { username: 'GDX', password: '666' };
        
        // 用户数据
        let users = JSON.parse(localStorage.getItem('gdx_users')) || [
            { id: 1, username: 'user001', password: '123456', isVip: true },
            { id: 2, username: 'test', password: 'test123', isVip: false }
        ];

        function saveData() {
            localStorage.setItem('gdx_users', JSON.stringify(users));
        }

        window.onload = function() {
            if (localStorage.getItem('gdx_admin_logged_in') === 'true') {
                showDashboard();
            }
        };

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const err = document.getElementById('error');

            if (u === SUPER_ACCOUNT.username && p === SUPER_ACCOUNT.password) {
                localStorage.setItem('gdx_admin_logged_in', 'true');
                err.classList.add('hidden');
                showDashboard();
            } else {
                err.textContent = '账号或密码错误！';
                err.classList.remove('hidden');
                document.querySelector('form').classList.add('shake');
                setTimeout(() => document.querySelector('form').classList.remove('shake'), 500);
            }
        }

        function showDashboard() {
            // 完全隐藏登录页，而不是用display:none覆盖
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.add('active');
            render();
        }

        function logout() {
            localStorage.removeItem('gdx_admin_logged_in');
            location.reload();
        }

        function render() {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('vipUsers').textContent = users.filter(u => u.isVip).length;
            document.getElementById('normalUsers').textContent = users.filter(u => !u.isVip).length;
            
            document.getElementById('tableBody').innerHTML = users.map(u => `
                <tr class="hover:bg-gray-800/30">
                    <td class="px-6 py-4 text-gray-400">#${u.id}</td>
                    <td class="px-6 py-4 font-medium">${u.username}</td>
                    <td class="px-6 py-4 text-gray-400">${u.password}</td>
                    <td class="px-6 py-4">${u.isVip ? '<span class="px-2 py-1 rounded-full text-xs font-bold bg-amber-500/20 text-amber-400 border border-amber-500/30">VIP</span>' : '<span class="px-2 py-1 rounded-full text-xs bg-gray-700 text-gray-400">普通</span>'}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="editUser(${u.id})" class="text-blue-400 hover:text-blue-300 mr-3"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteUser(${u.id})" class="text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
            saveData();
        }

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modalTitle').textContent = '添加账号';
            document.getElementById('editId').value = '';
            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('isVip').checked = false;
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function saveUser(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value;
            const isVip = document.getElementById('isVip').checked;

            if (id) {
                const idx = users.findIndex(u => u.id == id);
                if (idx !== -1) users[idx] = { ...users[idx], username, password, isVip };
            } else {
                users.push({
                    id: users.length ? Math.max(...users.map(u => u.id)) + 1 : 1,
                    username, password, isVip
                });
            }
            closeModal();
            render();
        }

        function editUser(id) {
            const u = users.find(x => x.id == id);
            if (u) {
                document.getElementById('modal').classList.remove('hidden');
                document.getElementById('modalTitle').textContent = '编辑账号';
                document.getElementById('editId').value = u.id;
                document.getElementById('newUsername').value = u.username;
                document.getElementById('newPassword').value = u.password;
                document.getElementById('isVip').checked = u.isVip;
            }
        }

        function deleteUser(id) {
            if (confirm('确定删除？')) {
                users = users.filter(u => u.id !== id);
                render();
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    

        // 监听其他页面（视频APP）的数据变化
        window.addEventListener('storage', function(e) {
            if (e.key === 'gdx_users') {
                console.log('检测到账号数据更新，正在同步...');
                // 重新读取数据
                users = JSON.parse(localStorage.getItem('gdx_users')) || users;
                render();
            }
        });

        // 页面重新可见时刷新数据（处理同页面切换）
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                const newData = localStorage.getItem('gdx_users');
                if (newData) {
                    const parsed = JSON.parse(newData);
                    if (JSON.stringify(parsed) !== JSON.stringify(users)) {
                        console.log('页面激活，数据已更新');
                        users = parsed;
                        render();
                    }
                }
            }
        });
</script>
</body>
</html>
