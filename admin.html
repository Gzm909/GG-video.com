<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDX 视频管理平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/dplayer@1.27.1/dist/DPlayer.min.css">
    <script src="https://unpkg.com/hls.js@1.4.12/dist/hls.min.js"></script>
    <script src="https://unpkg.com/dplayer@1.27.1/dist/DPlayer.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #dplayer { background: #000; }
        .upload-zone { 
            border: 2px dashed rgba(0, 212, 255, 0.3); 
            transition: all 0.3s;
        }
        .upload-zone:hover, .upload-zone.dragover { 
            border-color: #00d4ff; 
            background: rgba(0, 212, 255, 0.05);
        }
        .upload-zone.has-file { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .tab-active { background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%); color: white; }
        .tab-inactive { background: rgba(255,255,255,0.1); color: #94a3b8; }
        .tab-inactive:hover { background: rgba(255,255,255,0.2); color: white; }
        .url-input:focus { border-color: #00d4ff; box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1); }
        #urlPreviewPlayer { background: #000; border-radius: 8px; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#00d4ff', secondary: '#7b2cbf', dark: '#0f172a', surface: '#1e293b' } } }
        }
    </script>
<base target="_blank">
</head>
<body class="bg-gradient-to-br from-gray-900 via-blue-900 to-gray-900 min-h-screen text-white">

    <!-- API配置 - 自动检测 -->
    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3000' 
            : `http://${window.location.hostname}:3000`;
        
        console.log('API地址:', API_BASE);
    </script>

    <!-- 登录页 -->
    <div id="loginPage" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:linear-gradient(to bottom right, #111827, #1e3a8a, #111827);">
        <div class="glass rounded-2xl p-8 w-full max-w-md shadow-2xl mx-4">
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto rounded-full bg-gradient-to-br from-cyan-400 to-purple-600 flex items-center justify-center mb-4 text-white text-2xl font-bold">G</div>
                <h1 class="text-3xl font-bold gradient-text">GDX 管理平台</h1>
                <p class="text-gray-400 mt-2">超级管理员登录</p>
            </div>
            <form onsubmit="return false;" class="space-y-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">超级账号</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white" placeholder="请输入账号" value="GDX">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">密码</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white" placeholder="请输入密码" value="666">
                </div>
                <div id="errorMsg" style="display:none;" class="text-red-400 text-sm text-center bg-red-400/10 py-2 rounded-lg"></div>
                <button type="button" onclick="doLogin()" class="w-full py-3 bg-gradient-to-r from-cyan-400 to-purple-600 rounded-xl font-bold hover:opacity-90 transition-opacity">登录系统</button>
            </form>
        </div>
    </div>

    <!-- 管理面板 -->
    <div id="dashboardPage" style="display:none;min-height:100vh;">
        <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showAccountManager()">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-purple-600 flex items-center justify-center text-white font-bold">G</div>
                <span class="text-xl font-bold gradient-text">GDX 管理平台</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="showVideoManager()" class="px-4 py-2 bg-cyan-400/20 text-cyan-400 rounded-lg hover:bg-cyan-400/30 text-sm">
                    <i class="fas fa-video mr-2"></i>视频管理
                </button>
                <button onclick="showAccountManager()" class="px-4 py-2 bg-gray-700 text-gray-300 rounded-lg hover:bg-gray-600 text-sm">
                    <i class="fas fa-users mr-2"></i>账号管理
                </button>
                <span class="text-sm text-gray-400">超级管理员</span>
                <button onclick="doLogout()" class="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/30 text-sm">退出</button>
            </div>
        </nav>

        <!-- 账号管理 -->
        <main id="accountPage" class="max-w-7xl mx-auto px-6 py-8">
            <div class="grid grid-cols-4 gap-6 mb-8">
                <div class="glass rounded-xl p-6">
                    <p class="text-gray-400 text-sm">总用户数</p>
                    <p class="text-3xl font-bold text-cyan-400 mt-2" id="totalUsers">0</p>
                </div>
                <div class="glass rounded-xl p-6">
                    <p class="text-gray-400 text-sm">VIP用户</p>
                    <p class="text-3xl font-bold text-purple-400 mt-2" id="vipUsers">0</p>
                </div>
                <div class="glass rounded-xl p-6">
                    <p class="text-gray-400 text-sm">普通用户</p>
                    <p class="text-3xl font-bold text-gray-400 mt-2" id="normalUsers">0</p>
                </div>
                <div class="glass rounded-xl p-6">
                    <p class="text-gray-400 text-sm">今日新增</p>
                    <p class="text-3xl font-bold text-green-400 mt-2">+0</p>
                </div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">账号管理</h2>
                <button onclick="openUserModal()" class="px-6 py-2 bg-cyan-400 text-black font-bold rounded-lg hover:scale-105 transition-transform">+ 添加账号</button>
            </div>

            <div class="glass rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-800/50">
                        <tr>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400">ID</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400">账号</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400">密码</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400">状态</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-700/50"></tbody>
                </table>
            </div>
        </main>

        <!-- 视频管理 -->
        <div id="videoPage" style="display:none;" class="max-w-7xl mx-auto px-6 py-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">视频管理</h2>
                <button onclick="openVideoModal()" class="px-6 py-2 bg-cyan-400 text-black font-bold rounded-lg hover:scale-105 transition-transform">
                    <i class="fas fa-cloud-upload-alt mr-2"></i>添加视频
                </button>
            </div>

            <div class="grid grid-cols-4 gap-6 mb-8">
                <div class="glass rounded-xl p-6">
                    <p class="text-gray-400 text-sm">总视频数</p>
                    <p class="text-3xl font-bold text-cyan-400 mt-2" id="totalVideos">0</p>
                </div>
                <div class="glass rounded-xl p-6">
                    <p class="text-gray-400 text-sm">VIP专享</p>
                    <p class="text-3xl font-bold text-purple-400 mt-2" id="vipVideos">0</p>
                </div>
                <div class="glass rounded-xl p-6">
                    <p class="text-gray-400 text-sm">免费视频</p>
                    <p class="text-3xl font-bold text-gray-400 mt-2" id="freeVideos">0</p>
                </div>
                <div class="glass rounded-xl p-6">
                    <p class="text-gray-400 text-sm">存储占用</p>
                    <p class="text-3xl font-bold text-green-400 mt-2" id="storageUsed">0 MB</p>
                </div>
            </div>

            <div class="glass rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-800/50">
                        <tr>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400">封面</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400">标题</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400">来源</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400">权限</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-400 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="videoTableBody" class="divide-y divide-gray-700/50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 账号模态框 -->
    <div id="userModal" style="display:none;" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="glass rounded-2xl p-6 w-full max-w-md mx-4">
            <h3 class="text-xl font-bold mb-6" id="userModalTitle">添加账号</h3>
            <form onsubmit="saveUser(); return false;" class="space-y-4">
                <input type="hidden" id="editUserId">
                <input type="text" id="newUsername" required class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white" placeholder="账号">
                <input type="text" id="newPassword" required class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white" placeholder="密码">
                <label class="flex items-center gap-3 text-gray-300">
                    <input type="checkbox" id="isVip" class="w-5 h-5 rounded bg-gray-800 border-gray-700 text-cyan-400"> VIP账号
                </label>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeUserModal()" class="flex-1 py-3 bg-gray-700 rounded-xl hover:bg-gray-600">取消</button>
                    <button type="submit" class="flex-1 py-3 bg-cyan-400 text-black font-bold rounded-xl">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 【双模式】视频上传模态框 - 支持本地上传和URL上传 -->
    <div id="videoModal" style="display:none;" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="glass rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col">
            <!-- 头部 -->
            <div class="flex justify-between items-center p-6 border-b border-gray-700">
                <h3 class="text-xl font-bold">添加视频</h3>
                <button onclick="closeVideoModal()" class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center hover:bg-gray-600 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- 上传方式切换标签 -->
            <div class="flex p-4 gap-2 border-b border-gray-700">
                <button onclick="switchUploadMode('local')" id="tabLocal" class="flex-1 py-2 px-4 rounded-lg font-medium transition-all tab-active">
                    <i class="fas fa-upload mr-2"></i>本地上传
                </button>
                <button onclick="switchUploadMode('url')" id="tabUrl" class="flex-1 py-2 px-4 rounded-lg font-medium transition-all tab-inactive">
                    <i class="fas fa-link mr-2"></i>链接导入
                </button>
            </div>

            <!-- 内容区域 -->
            <div class="flex-1 overflow-y-auto p-6">
                
                <!-- 本地上传模式 -->
                <div id="localUploadPanel" class="space-y-4">
                    <!-- 上传进度 -->
                    <div id="uploadProgress" class="hidden">
                        <div class="flex justify-between text-sm mb-2">
                            <span class="text-cyan-400" id="uploadStatus">准备上传...</span>
                            <span class="text-white font-mono" id="uploadPercent">0%</span>
                        </div>
                        <div class="w-full bg-gray-700 rounded-full h-2">
                            <div id="progressBar" class="bg-gradient-to-r from-cyan-400 to-purple-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- 标题 -->
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">视频标题 <span class="text-red-400">*</span></label>
                        <input type="text" id="localVideoTitle" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white transition-colors" placeholder="请输入视频标题">
                    </div>

                    <!-- 文件上传区域 -->
                    <div class="grid grid-cols-2 gap-4">
                        <!-- 封面上传 -->
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">封面图片 <span class="text-red-400">*</span></label>
                            <div id="coverZone" class="upload-zone rounded-xl p-4 cursor-pointer relative h-32 flex items-center justify-center" onclick="document.getElementById('coverInput').click()">
                                <input type="file" id="coverInput" accept="image/*" class="hidden" onchange="handleFileSelect('cover', this)">
                                <div id="coverPlaceholder" class="text-center">
                                    <i class="fas fa-image text-3xl text-gray-500 mb-2"></i>
                                    <p class="text-sm text-gray-400">点击上传封面</p>
                                    <p class="text-xs text-gray-600 mt-1">支持 JPG、PNG</p>
                                </div>
                                <div id="coverPreview" class="hidden absolute inset-0 p-2">
                                    <img class="w-full h-full object-cover rounded-lg">
                                    <button onclick="event.stopPropagation(); clearFile('cover')" class="absolute top-1 right-1 w-6 h-6 bg-red-500 rounded-full text-white text-xs flex items-center justify-center hover:bg-red-600 transition-colors">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- 视频上传 -->
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">视频文件 <span class="text-red-400">*</span></label>
                            <div id="videoZone" class="upload-zone rounded-xl p-4 cursor-pointer relative h-32 flex items-center justify-center" onclick="document.getElementById('videoInput').click()">
                                <input type="file" id="videoInput" accept="video/*" class="hidden" onchange="handleFileSelect('video', this)">
                                <div id="videoPlaceholder" class="text-center">
                                    <i class="fas fa-film text-3xl text-gray-500 mb-2"></i>
                                    <p class="text-sm text-gray-400">点击上传视频</p>
                                    <p class="text-xs text-gray-600 mt-1">MP4/MOV ≤500MB</p>
                                </div>
                                <div id="videoPreview" class="hidden absolute inset-0 p-2 flex flex-col items-center justify-center">
                                    <i class="fas fa-check-circle text-green-400 text-4xl mb-2"></i>
                                    <p class="text-sm text-gray-300 truncate max-w-full px-2" id="videoFileName"></p>
                                    <button onclick="event.stopPropagation(); clearFile('video')" class="mt-2 px-3 py-1 bg-red-500/80 rounded-full text-white text-xs hover:bg-red-500 transition-colors">
                                        <i class="fas fa-trash-alt mr-1"></i>移除
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 其他信息 -->
                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">分类</label>
                            <select id="localVideoCategory" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white">
                                <option value="movie">电影</option>
                                <option value="tv">电视剧</option>
                                <option value="variety">综艺</option>
                                <option value="anime">动漫</option>
                                <option value="documentary">纪录片</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">评分</label>
                            <input type="number" id="localVideoRating" min="0" max="10" step="0.1" value="8.0" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white">
                        </div>
                        <div class="flex items-end pb-3">
                            <label class="flex items-center gap-3 text-gray-300 cursor-pointer hover:text-white transition-colors">
                                <input type="checkbox" id="localIsVipVideo" class="w-5 h-5 rounded bg-gray-800 border-gray-700 text-cyan-400 focus:ring-cyan-400"> 
                                <span class="font-medium">VIP专享</span>
                            </label>
                        </div>
                    </div>

                    <!-- 简介 -->
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">视频简介</label>
                        <textarea id="localVideoDesc" rows="3" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white resize-none" placeholder="请输入视频简介（可选）..."></textarea>
                    </div>

                    <!-- 按钮 -->
                    <div class="flex gap-3 pt-2">
                        <button type="button" onclick="closeVideoModal()" class="flex-1 py-3 bg-gray-700 rounded-xl hover:bg-gray-600 transition-colors font-medium">取消</button>
                        <button type="button" onclick="uploadLocalVideo()" id="localUploadBtn" disabled class="flex-1 py-3 bg-cyan-400 text-black font-bold rounded-xl hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-cloud-upload-alt mr-2"></i>开始上传
                        </button>
                    </div>
                </div>

                <!-- URL导入模式 -->
                <div id="urlUploadPanel" class="hidden space-y-4">
                    <!-- 标题 -->
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">视频标题 <span class="text-red-400">*</span></label>
                        <input type="text" id="urlVideoTitle" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white transition-colors" placeholder="请输入视频标题">
                    </div>

                    <!-- 封面URL -->
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">封面图片URL <span class="text-red-400">*</span></label>
                        <div class="flex gap-2">
                            <input type="url" id="urlCoverInput" class="flex-1 px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white url-input transition-all" placeholder="https://example.com/cover.jpg" oninput="previewUrlCover()">
                            <button onclick="previewUrlCover()" class="px-4 py-3 bg-gray-700 rounded-xl hover:bg-gray-600 transition-colors">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <!-- 封面预览 -->
                        <div id="urlCoverPreview" class="hidden mt-3 rounded-xl overflow-hidden bg-gray-800 h-40 relative">
                            <img id="urlCoverImg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/640x360?text=Invalid+Image'">
                            <div class="absolute inset-0 flex items-center justify-center bg-black/50 hidden" id="urlCoverLoading">
                                <i class="fas fa-spinner fa-spin text-2xl text-cyan-400"></i>
                            </div>
                        </div>
                    </div>

                    <!-- 视频URL -->
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">视频链接URL <span class="text-red-400">*</span></label>
                        <div class="flex gap-2">
                            <input type="url" id="urlVideoInput" class="flex-1 px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white url-input transition-all" placeholder="https://example.com/video.mp4 或 .m3u8">
                            <button onclick="testVideoUrl()" class="px-4 py-3 bg-gray-700 rounded-xl hover:bg-gray-600 transition-colors whitespace-nowrap">
                                <i class="fas fa-play mr-1"></i>测试
                            </button>
                        </div>
                        <p class="text-xs text-gray-500 mt-2">
                            <i class="fas fa-info-circle mr-1"></i>
                            支持格式: MP4、WebM、HLS(m3u8)
                        </p>
                    </div>

                    <!-- 视频预览播放器 -->
                    <div id="urlPlayerContainer" class="hidden">
                        <label class="block text-sm text-gray-400 mb-2">视频预览</label>
                        <div id="urlPreviewPlayer" class="w-full aspect-video"></div>
                    </div>

                    <!-- 其他信息 -->
                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">分类</label>
                            <select id="urlVideoCategory" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white">
                                <option value="movie">电影</option>
                                <option value="tv">电视剧</option>
                                <option value="variety">综艺</option>
                                <option value="anime">动漫</option>
                                <option value="documentary">纪录片</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">评分</label>
                            <input type="number" id="urlVideoRating" min="0" max="10" step="0.1" value="8.0" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white">
                        </div>
                        <div class="flex items-end pb-3">
                            <label class="flex items-center gap-3 text-gray-300 cursor-pointer hover:text-white transition-colors">
                                <input type="checkbox" id="urlIsVipVideo" class="w-5 h-5 rounded bg-gray-800 border-gray-700 text-cyan-400 focus:ring-cyan-400"> 
                                <span class="font-medium">VIP专享</span>
                            </label>
                        </div>
                    </div>

                    <!-- 简介 -->
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">视频简介</label>
                        <textarea id="urlVideoDesc" rows="3" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-400 outline-none text-white resize-none" placeholder="请输入视频简介（可选）..."></textarea>
                    </div>

                    <!-- 按钮 -->
                    <div class="flex gap-3 pt-2">
                        <button type="button" onclick="closeVideoModal()" class="flex-1 py-3 bg-gray-700 rounded-xl hover:bg-gray-600 transition-colors font-medium">取消</button>
                        <button type="button" onclick="saveUrlVideo()" id="urlSaveBtn" disabled class="flex-1 py-3 bg-gradient-to-r from-cyan-400 to-purple-500 text-black font-bold rounded-xl hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-save mr-2"></i>保存到库
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 视频预览模态框 -->
    <div id="previewModal" style="display:none;" class="fixed inset-0 z-[70] bg-black flex flex-col">
        <div class="flex items-center justify-between p-4 bg-gray-900 border-b border-gray-800">
            <h3 class="text-lg font-bold" id="previewTitle">视频预览</h3>
            <button onclick="closePreview()" class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center hover:bg-gray-700">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="flex-1 flex items-center justify-center bg-gray-950 p-4">
            <div id="previewPlayer" class="w-full max-w-4xl aspect-video"></div>
        </div>
    </div>

    <script>
        // ========== 数据层 ==========
        const SUPER_ACCOUNT = { username: 'GDX', password: '666' };
        
        function safeGet(key, def) {
            try {
                const d = localStorage.getItem(key);
                return d ? JSON.parse(d) : def;
            } catch(e) { return def; }
        }
        
        function safeSet(key, val) {
            try {
                localStorage.setItem(key, JSON.stringify(val));
                return true;
            } catch(e) { 
                alert('保存失败：存储空间不足');
                return false; 
            }
        }
        
        let users = safeGet('gdx_users', [
            { id: 1, username: 'user001', password: '123456', isVip: true },
            { id: 2, username: 'test', password: 'test123', isVip: false }
        ]);
        
        let videos = safeGet('gdx_videos', []);
        let selectedFiles = { cover: null, video: null };
        let dp = null, previewDp = null, urlDp = null;
        let currentUploadMode = 'local';

        // ========== 登录 ==========
        if (localStorage.getItem('gdx_admin_logged_in') === 'true') showDashboard();

        function doLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const err = document.getElementById('errorMsg');
            
            if (u === SUPER_ACCOUNT.username && p === SUPER_ACCOUNT.password) {
                localStorage.setItem('gdx_admin_logged_in', 'true');
                err.style.display = 'none';
                showDashboard();
            } else {
                err.textContent = '账号或密码错误！';
                err.style.display = 'block';
            }
        }

        function showDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboardPage').style.display = 'block';
            renderUsers();
        }

        function doLogout() {
            localStorage.removeItem('gdx_admin_logged_in');
            location.reload();
        }

        // ========== 账号管理 ==========
        function renderUsers() {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('vipUsers').textContent = users.filter(u => u.isVip).length;
            document.getElementById('normalUsers').textContent = users.filter(u => !u.isVip).length;
            
            document.getElementById('tableBody').innerHTML = users.map(u => `
                <tr class="hover:bg-gray-800/30">
                    <td class="px-6 py-4 text-gray-400">#${u.id}</td>
                    <td class="px-6 py-4 font-medium">${u.username}</td>
                    <td class="px-6 py-4 text-gray-400">${u.password}</td>
                    <td class="px-6 py-4">${u.isVip ? '<span class="px-2 py-1 rounded-full text-xs font-bold bg-amber-500/20 text-amber-400">VIP</span>' : '<span class="px-2 py-1 rounded-full text-xs bg-gray-700 text-gray-400">普通</span>'}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="editUser(${u.id})" class="text-blue-400 hover:text-blue-300 mr-3"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteUser(${u.id})" class="text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
            safeSet('gdx_users', users);
        }

        function openUserModal() {
            document.getElementById('userModal').style.display = 'flex';
            document.getElementById('userModalTitle').textContent = '添加账号';
            document.getElementById('editUserId').value = '';
            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('isVip').checked = false;
        }

        function closeUserModal() {
            document.getElementById('userModal').style.display = 'none';
        }

        function saveUser() {
            const id = document.getElementById('editUserId').value;
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value;
            const isVip = document.getElementById('isVip').checked;
            
            if (!username || !password) {
                alert('请填写完整信息');
                return;
            }
            
            if (id) {
                const idx = users.findIndex(u => u.id == id);
                if (idx !== -1) users[idx] = { ...users[idx], username, password, isVip };
            } else {
                const newId = users.length > 0 ? Math.max(...users.map(u => u.id)) + 1 : 1;
                users.push({ id: newId, username, password, isVip });
            }
            closeUserModal();
            renderUsers();
        }

        function editUser(id) {
            const u = users.find(x => x.id == id);
            if (!u) return;
            openUserModal();
            document.getElementById('userModalTitle').textContent = '编辑账号';
            document.getElementById('editUserId').value = u.id;
            document.getElementById('newUsername').value = u.username;
            document.getElementById('newPassword').value = u.password;
            document.getElementById('isVip').checked = u.isVip;
        }

        function deleteUser(id) {
            if (!confirm('确定删除？')) return;
            users = users.filter(u => u.id !== id);
            renderUsers();
        }

        // ========== 视频管理 ==========
        function showVideoManager() {
            document.getElementById('accountPage').style.display = 'none';
            document.getElementById('videoPage').style.display = 'block';
            renderVideos();
        }

        function showAccountManager() {
            document.getElementById('accountPage').style.display = 'block';
            document.getElementById('videoPage').style.display = 'none';
            renderUsers();
        }

        function renderVideos() {
            videos = safeGet('gdx_videos', []);
            document.getElementById('totalVideos').textContent = videos.length;
            document.getElementById('vipVideos').textContent = videos.filter(v => v.isVip).length;
            document.getElementById('freeVideos').textContent = videos.filter(v => !v.isVip).length;
            
            const totalSize = videos.reduce((s, v) => s + (v.fileSize || 0), 0);
            document.getElementById('storageUsed').textContent = formatSize(totalSize);
            
            const tbody = document.getElementById('videoTableBody');
            if (videos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">暂无视频，点击右上角添加</td></tr>';
                return;
            }
            
            tbody.innerHTML = videos.map(v => `
                <tr class="hover:bg-gray-800/30">
                    <td class="px-6 py-4"><img src="${v.coverUrl}" class="w-16 h-10 object-cover rounded-lg bg-gray-700" onerror="this.src='https://via.placeholder.com/160x90?text=No+Cover'"></td>
                    <td class="px-6 py-4 font-medium">${v.title}</td>
                    <td class="px-6 py-4">
                        ${v.sourceType === 'url' 
                            ? '<span class="px-2 py-1 rounded-full text-xs bg-blue-500/20 text-blue-400"><i class="fas fa-link mr-1"></i>链接</span>' 
                            : '<span class="px-2 py-1 rounded-full text-xs bg-green-500/20 text-green-400"><i class="fas fa-server mr-1"></i>本地</span>'}
                    </td>
                    <td class="px-6 py-4">${v.isVip ? '<span class="px-2 py-1 rounded-full text-xs font-bold bg-amber-500/20 text-amber-400">VIP</span>' : '<span class="px-2 py-1 rounded-full text-xs bg-gray-700 text-gray-400">免费</span>'}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="playVideo(${v.id})" class="text-green-400 hover:text-green-300 mr-3"><i class="fas fa-play-circle"></i></button>
                        <button onclick="deleteVideo(${v.id})" class="text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function formatSize(b) {
            if (!b) return '0 B';
            const u = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(b) / Math.log(1024));
            return (b / Math.pow(1024, i)).toFixed(1) + ' ' + u[i];
        }

        // ========== 上传模式切换 ==========
        function switchUploadMode(mode) {
            currentUploadMode = mode;
            
            const tabLocal = document.getElementById('tabLocal');
            const tabUrl = document.getElementById('tabUrl');
            const localPanel = document.getElementById('localUploadPanel');
            const urlPanel = document.getElementById('urlUploadPanel');
            
            if (mode === 'local') {
                tabLocal.className = 'flex-1 py-2 px-4 rounded-lg font-medium transition-all tab-active';
                tabUrl.className = 'flex-1 py-2 px-4 rounded-lg font-medium transition-all tab-inactive';
                localPanel.classList.remove('hidden');
                urlPanel.classList.add('hidden');
                // 销毁URL播放器
                if (urlDp) {
                    urlDp.destroy();
                    urlDp = null;
                }
            } else {
                tabLocal.className = 'flex-1 py-2 px-4 rounded-lg font-medium transition-all tab-inactive';
                tabUrl.className = 'flex-1 py-2 px-4 rounded-lg font-medium transition-all tab-active';
                localPanel.classList.add('hidden');
                urlPanel.classList.remove('hidden');
            }
        }

        // ========== 本地上传逻辑 ==========
        function openVideoModal() {
            document.getElementById('videoModal').style.display = 'flex';
            resetUploadForm();
            switchUploadMode('local');
        }

        function closeVideoModal() {
            document.getElementById('videoModal').style.display = 'none';
            if (dp) { dp.destroy(); dp = null; }
            if (urlDp) { urlDp.destroy(); urlDp = null; }
        }

        function resetUploadForm() {
            selectedFiles = { cover: null, video: null };
            
            // 重置本地上传
            document.getElementById('localVideoTitle').value = '';
            document.getElementById('localVideoCategory').value = 'movie';
            document.getElementById('localVideoRating').value = '8.0';
            document.getElementById('localVideoDesc').value = '';
            document.getElementById('localIsVipVideo').checked = false;
            
            ['cover', 'video'].forEach(t => {
                document.getElementById(t + 'Input').value = '';
                document.getElementById(t + 'Placeholder').classList.remove('hidden');
                document.getElementById(t + 'Preview').classList.add('hidden');
                document.getElementById(t + 'Zone').classList.remove('has-file');
            });
            
            document.getElementById('uploadProgress').classList.add('hidden');
            document.getElementById('localUploadBtn').disabled = true;
            
            // 重置URL上传
            document.getElementById('urlVideoTitle').value = '';
            document.getElementById('urlCoverInput').value = '';
            document.getElementById('urlVideoInput').value = '';
            document.getElementById('urlCoverPreview').classList.add('hidden');
            document.getElementById('urlPlayerContainer').classList.add('hidden');
            document.getElementById('urlVideoCategory').value = 'movie';
            document.getElementById('urlVideoRating').value = '8.0';
            document.getElementById('urlVideoDesc').value = '';
            document.getElementById('urlIsVipVideo').checked = false;
            document.getElementById('urlSaveBtn').disabled = true;
        }

        function handleFileSelect(type, input) {
            const file = input.files[0];
            if (!file) return;
            
            if (type === 'cover') {
                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件');
                    return;
                }
                if (file.size > 5 * 1024 * 1024) {
                    alert('封面不能超过5MB');
                    return;
                }
            } else if (type === 'video') {
                const allowed = ['video/mp4', 'video/webm', 'video/quicktime'];
                if (!allowed.includes(file.type)) {
                    alert('请选择 MP4、WebM 或 MOV 格式');
                    return;
                }
                if (file.size > 500 * 1024 * 1024) {
                    alert('视频不能超过500MB');
                    return;
                }
            }
            
            selectedFiles[type] = file;
            
            document.getElementById(type + 'Placeholder').classList.add('hidden');
            document.getElementById(type + 'Preview').classList.remove('hidden');
            document.getElementById(type + 'Zone').classList.add('has-file');
            
            if (type === 'cover') {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.querySelector('#coverPreview img').src = e.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                document.getElementById('videoFileName').textContent = file.name;
            }
            
            checkCanUploadLocal();
        }

        function clearFile(type) {
            selectedFiles[type] = null;
            document.getElementById(type + 'Input').value = '';
            document.getElementById(type + 'Placeholder').classList.remove('hidden');
            document.getElementById(type + 'Preview').classList.add('hidden');
            document.getElementById(type + 'Zone').classList.remove('has-file');
            checkCanUploadLocal();
        }

        function checkCanUploadLocal() {
            const can = selectedFiles.cover && selectedFiles.video && document.getElementById('localVideoTitle').value.trim();
            document.getElementById('localUploadBtn').disabled = !can;
        }

        document.getElementById('localVideoTitle').addEventListener('input', checkCanUploadLocal);

        async function uploadLocalVideo() {
            const title = document.getElementById('localVideoTitle').value.trim();
            if (!title || !selectedFiles.cover || !selectedFiles.video) {
                alert('请填写完整信息');
                return;
            }

            document.getElementById('uploadProgress').classList.remove('hidden');
            document.getElementById('localUploadBtn').disabled = true;

            const formData = new FormData();
            formData.append('cover', selectedFiles.cover);
            formData.append('video', selectedFiles.video);

            const xhr = new XMLHttpRequest();
            
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const p = Math.round((e.loaded / e.total) * 100);
                    document.getElementById('progressBar').style.width = p + '%';
                    document.getElementById('uploadPercent').textContent = p + '%';
                    document.getElementById('uploadStatus').textContent = p < 100 ? `上传中 ${p}%` : '处理中...';
                }
            });

            xhr.addEventListener('load', () => {
                if (xhr.status === 200) {
                    const result = JSON.parse(xhr.responseText);
                    
                    const videoData = {
                        id: Date.now(),
                        title: title,
                        coverUrl: result.cover.url,
                        videoUrl: result.video.url,
                        category: document.getElementById('localVideoCategory').value,
                        rating: parseFloat(document.getElementById('localVideoRating').value) || 8.0,
                        desc: document.getElementById('localVideoDesc').value.trim(),
                        isVip: document.getElementById('localIsVipVideo').checked,
                        fileSize: result.video.size,
                        sourceType: 'local',
                        createdAt: new Date().toISOString()
                    };

                    videos.push(videoData);
                    
                    if (safeSet('gdx_videos', videos)) {
                        window.dispatchEvent(new StorageEvent('storage', {
                            key: 'gdx_videos',
                            newValue: JSON.stringify(videos)
                        }));
                        
                        closeVideoModal();
                        renderVideos();
                        showToast('上传成功');
                    }
                } else {
                    alert('上传失败');
                    document.getElementById('localUploadBtn').disabled = false;
                }
            });

            xhr.addEventListener('error', () => {
                alert('网络错误');
                document.getElementById('localUploadBtn').disabled = false;
            });

            xhr.open('POST', API_BASE + '/upload');
            xhr.send(formData);
        }

        // ========== URL上传逻辑 ==========
        function previewUrlCover() {
            const url = document.getElementById('urlCoverInput').value.trim();
            const preview = document.getElementById('urlCoverPreview');
            const img = document.getElementById('urlCoverImg');
            const loading = document.getElementById('urlCoverLoading');
            
            if (!url) {
                preview.classList.add('hidden');
                return;
            }
            
            preview.classList.remove('hidden');
            loading.classList.remove('hidden');
            
            img.onload = () => {
                loading.classList.add('hidden');
            };
            
            img.onerror = () => {
                loading.classList.add('hidden');
            };
            
            img.src = url;
            checkCanSaveUrl();
        }

        function testVideoUrl() {
            const url = document.getElementById('urlVideoInput').value.trim();
            if (!url) {
                alert('请输入视频链接');
                return;
            }
            
            document.getElementById('urlPlayerContainer').classList.remove('hidden');
            
            if (urlDp) {
                urlDp.destroy();
            }
            
            const isHLS = url.endsWith('.m3u8') || url.includes('.m3u8');
            
            urlDp = new DPlayer({
                container: document.getElementById('urlPreviewPlayer'),
                video: {
                    url: url,
                    type: isHLS ? 'hls' : 'auto'
                },
                autoplay: false,
                theme: '#00d4ff',
                lang: 'zh-cn'
            });
            
            checkCanSaveUrl();
        }

        function checkCanSaveUrl() {
            const title = document.getElementById('urlVideoTitle').value.trim();
            const coverUrl = document.getElementById('urlCoverInput').value.trim();
            const videoUrl = document.getElementById('urlVideoInput').value.trim();
            
            const can = title && coverUrl && videoUrl;
            document.getElementById('urlSaveBtn').disabled = !can;
        }

        ['urlVideoTitle', 'urlCoverInput', 'urlVideoInput'].forEach(id => {
            document.getElementById(id).addEventListener('input', checkCanSaveUrl);
        });

        function saveUrlVideo() {
            const title = document.getElementById('urlVideoTitle').value.trim();
            const coverUrl = document.getElementById('urlCoverInput').value.trim();
            const videoUrl = document.getElementById('urlVideoInput').value.trim();
            
            if (!title || !coverUrl || !videoUrl) {
                alert('请填写完整信息');
                return;
            }

            const videoData = {
                id: Date.now(),
                title: title,
                coverUrl: coverUrl,
                videoUrl: videoUrl,
                category: document.getElementById('urlVideoCategory').value,
                rating: parseFloat(document.getElementById('urlVideoRating').value) || 8.0,
                desc: document.getElementById('urlVideoDesc').value.trim(),
                isVip: document.getElementById('urlIsVipVideo').checked,
                fileSize: 0,
                sourceType: 'url',
                createdAt: new Date().toISOString()
            };

            videos.push(videoData);
            
            if (safeSet('gdx_videos', videos)) {
                window.dispatchEvent(new StorageEvent('storage', {
                    key: 'gdx_videos',
                    newValue: JSON.stringify(videos)
                }));
                
                closeVideoModal();
                renderVideos();
                showToast('保存成功');
            }
        }

        // ========== 通用功能 ==========
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-full shadow-lg z-[100] text-sm';
            t.innerHTML = `<i class="fas fa-check-circle mr-2"></i>${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function deleteVideo(id) {
            if (!confirm('确定删除？')) return;
            videos = videos.filter(v => v.id !== id);
            if (safeSet('gdx_videos', videos)) {
                renderVideos();
                showToast('已删除');
            }
        }

        function playVideo(id) {
            const v = videos.find(x => x.id == id);
            if (!v) return;
            
            document.getElementById('previewTitle').textContent = v.title;
            document.getElementById('previewModal').style.display = 'flex';
            
            if (previewDp) previewDp.destroy();
            
            const isHLS = v.videoUrl.endsWith('.m3u8') || v.videoUrl.includes('.m3u8');
            
            previewDp = new DPlayer({
                container: document.getElementById('previewPlayer'),
                video: { 
                    url: v.videoUrl, 
                    type: isHLS ? 'hls' : 'auto', 
                    pic: v.coverUrl 
                },
                autoplay: true,
                theme: '#00d4ff',
                lang: 'zh-cn',
                screenshot: true
            });
        }

        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
            if (previewDp) { previewDp.destroy(); previewDp = null; }
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'gdx_videos') {
                videos = safeGet('gdx_videos', []);
                if (document.getElementById('videoPage').style.display !== 'none') {
                    renderVideos();
                }
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeUserModal();
                closeVideoModal();
                closePreview();
            }
        });
    </script>
</body>
</html>
